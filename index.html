<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Integral de Planta</title>
  <meta name="theme-color" content="#2563eb" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --blue:#2563EB;
      --blue-700:#1d4ed8;
      --navy:#1E293B;
      --slate:#64748B;
      --muted:#94A3B8;
      --line:#E5E7EB;
      --line-2:#EEF2F7;
      --bg:#F8FAFC;
      --card:#FFFFFF;
      --green:#16A34A;
      --green-soft:#EAF8EF;
      --red:#EF4444;
      --red-soft:#FEECEC;
      --orange:#F59E0B;
      --orange-soft:#FFF4DB;
      --purple:#7C3AED;
      --purple-soft:#F1EDFF;

      --sidebar:250px;

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      background:

      letter-spacing:.01em;

    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    a{color:inherit}
    .app{min-height:100vh;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr)}
    .sidebar{
      position:sticky;top:0;height:100vh;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
      border-right:1px solid var(--line);padding:20px 18px;z-index:40;display:flex;flex-direction:column;gap:18px;

    .brand{display:flex;align-items:center;gap:12px;padding:8px 8px 18px;border-bottom:1px solid var(--line)}

    .nav-btn:hover{background:#F1F5F9;color:var(--navy)}
    .nav-btn.active{background:var(--blue-soft);color:var(--blue)}

    .sidebar-mini-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;box-shadow:var(--shadow-soft)}

    .sidebar-mini-card p{margin:0;font-size:12px;color:var(--slate);line-height:1.45}
    .main{min-width:0;display:flex;flex-direction:column}
    .topbar{height:var(--topbar);position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 28px;background:rgba(248,250,252,.88);backdrop-filter:blur(18px);border-bottom:1px solid rgba(229,231,235,.8)}
    .menu-toggle{display:none;width:44px;height:44px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--navy);place-items:center}
    .top-left{display:flex;align-items:center;gap:14px;min-width:0}
    .current-title{min-width:0}

    .current-title span{display:block;font-size:12px;color:var(--slate);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-actions{display:flex;align-items:center;gap:10px;justify-content:flex-end}
    .icon-round{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:#fff;color:#475569;display:grid;place-items:center}

    .admin-avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-soft);color:var(--blue);display:grid;place-items:center;font-weight:800}
    .content{width:100%;max-width:1520px;margin:0 auto;padding:28px 28px 42px}
    .page{display:none;animation:fadeIn .22s ease}
    .page.active{display:block}
    @keyframes fadeIn{from{opacity:.35;transform:translateY(4px)}to{opacity:1;transform:none}}
    .slide-title{margin:0 0 26px;text-align:center;position:relative;color:var(--navy)}
    .slide-title.left{text-align:left}
    .slide-title h2{font-size:46px;line-height:1.05;letter-spacing:.06em;margin:0;font-weight:850}
    .slide-title p{font-size:19px;letter-spacing:.08em;color:var(--slate);margin:10px 0 0}
    .slide-title::before,.slide-title::after{content:"";position:absolute;top:28px;height:2px;background:var(--blue);opacity:.9;border-radius:999px}
    .slide-title::before{left:0;width:31%}.slide-title::after{right:0;width:31%}
    .slide-title.left::before,.slide-title.left::after{display:none}
    .slide-title.left h2{letter-spacing:.01em;font-size:44px}.slide-title.left p{letter-spacing:.02em;font-size:22px}

    .field{display:grid;gap:8px;min-width:0}

    th{font-weight:850;color:#334155;background:#FBFCFE}

    .center{text-align:center}.right{text-align:right}

    .st-gray{background:#F1F5F9;color:#475569}
    .st-purple{background:var(--purple-soft);color:var(--purple)}

    .metric-value{font-size:30px;letter-spacing:.02em;line-height:1;font-weight:850;color:var(--navy)}
    .metric-unit{font-size:18px;font-weight:750;color:inherit;margin-left:3px}
    .metric-sub{margin-top:9px;color:var(--slate);font-size:13px}
    .metric-icon{width:48px;height:48px;border-radius:14px;color:var(--blue);display:grid;place-items:center;background:#fff}
    .chart-box{border:1px solid var(--line);border-radius:18px;background:#fff;padding:18px;min-height:280px;position:relative}
    .chart-box h4{margin:0 0 14px;font-size:16px;letter-spacing:-.02em}
    canvas{max-width:100%}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px}
    .mini-note{border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow-soft);padding:22px;display:flex;gap:16px;align-items:flex-start}
    .note-icon{width:52px;height:52px;border-radius:50%;background:var(--blue-soft);color:var(--blue);display:grid;place-items:center;flex:0 0 auto}

    .info-strip{border:1px solid #DDEAFE;background:#FBFDFF;border-radius:16px;padding:17px 20px;color:#475569;display:flex;align-items:center;gap:14px;font-size:15px}

    .app-shell{display:grid;grid-template-columns:230px minmax(0,1fr);overflow:hidden}
    .mock-sidebar{border-right:1px solid var(--line);padding:20px 16px;background:#fff}
    .mock-brand{height:50px;display:flex;align-items:center;gap:10px;font-weight:850;color:var(--navy);margin-bottom:20px}
    .mock-brand svg{color:var(--blue)}
    .mock-nav{display:grid;gap:8px}.mock-nav div{height:46px;display:flex;align-items:center;gap:12px;padding:0 14px;border-radius:12px;color:#334155;font-weight:700}.mock-nav .active{background:var(--blue-soft);color:var(--blue)}.mock-nav svg{width:20px;height:20px}
    .mock-main{padding:0;background:#fff}.mock-top{height:70px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:flex-end;gap:20px;padding:0 24px}.mock-content{padding:30px 28px}.mock-content h3{margin:0;font-size:20px}.mock-content .small-sub{margin:8px 0 22px;color:var(--slate)}

function processWhatsapp(){
  const text=$('#waText').value; if(!text.trim()){showToast('Pegá un mensaje para procesar');return}
  let sector='Producción'; const date=$('#cargaDate').value || todayISO(); let count=0;
  text.split(/\n+/).forEach(line=>{
    line=line.trim().replace(/^[-✅]+/,'').trim(); if(!line)return;
    if(!line.includes(':')){ sector=line.replace(/\d{1,2}\/\d{1,2}.*/,'').trim()||sector; return; }
    const [rawName,rawVal]=line.split(':'); const name=normalizeName(rawName); const val=number(rawVal.match(/-?\d+[\d.,]*/)?.[0]);
    if(!name||/sal|total|fecha/i.test(name)) return;
    state.preview.push({id:uid(),date,sector,employee:name,qty:val,salt:0,origin:'WhatsApp'}); count++;
  });
  saveState();renderPreviewTable();showToast(`Se procesaron ${count} registros`);
}
function processExcel(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'}); const sh=wb.Sheets[wb.SheetNames[0]]; const rows=XLSX.utils.sheet_to_json(sh,{defval:''}); let count=0; const date=$('#cargaDate').value || todayISO();
      rows.forEach(row=>{
        const keys=Object.keys(row); const get=(...names)=>{const k=keys.find(x=>names.some(n=>x.toLowerCase().includes(n))); return k?row[k]:''};
        const sector=get('sector','linea','línea') || $('#cargaSector').value; const employee=get('empleado','operario','nombre') || ''; const qty=number(get('produccion','producción','cantidad','kg','unidad')); const salt=number(get('sal'));
        if(qty){state.preview.push({id:uid(),date,sector,employee,qty,salt,origin:'Excel'}); count++;}
      });
      saveState(); renderPreviewTable(); showToast(`Excel importado: ${count} registros`);
    }catch(err){showToast('No pude leer el archivo Excel')}
  };
  reader.readAsArrayBuffer(file);
}

}
function renderSaltTable(){
  $('#saltTable').innerHTML=`<table><thead><tr><th>Fecha / Hora</th><th>Tipo</th><th>Cantidad (kg)</th><th>Origen / Destino</th><th>Usuario</th><th></th></tr></thead><tbody>${state.salt.slice().sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time)).slice(0,8).map(r=>`<tr><td>${isoToAR(r.date)} ${r.time}</td><td><span class="status ${r.qty>=0?'st-green':'st-red'}">${r.type}</span></td><td class="${r.qty>=0?'green':'red'}">${r.qty>0?'+':''}${fmt.format(r.qty)}</td><td>${r.origin}</td><td>${r.user}</td><td><button class="btn small danger" onclick="deleteSalt('${r.id}')">${svg.trash}</button></td></tr>`).join('')}</tbody></table>`
}
function deleteSalt(id){state.salt=state.salt.filter(r=>r.id!==id);saveState();renderSal();renderCharts();}
function openSaltModal(){
  openModal('Agregar movimiento de sal', `<div class="modal-grid"><div class="field"><label>Fecha</label><input id="msDate" type="date" class="input" value="${todayISO()}"></div><div class="field"><label>Hora</label><input id="msTime" type="time" class="input" value="${new Date().toTimeString().slice(0,5)}"></div><div class="field"><label>Tipo</label><select id="msType"><option>Entrada</option><option>Salida</option></select></div><div class="field"><label>Cantidad kg</label><input id="msQty" class="input" type="number" value="50"></div><div class="field"><label>Origen / Destino</label><input id="msOrigin" class="input" value="Depósito Central"></div><div class="field"><label>Usuario</label><input id="msUser" class="input" value="Sistema"></div></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveSaltModal()">Guardar</button></div>`);
}
function saveSaltModal(){let qty=number($('#msQty').value); if($('#msType').value==='Salida') qty=-Math.abs(qty); state.salt.push({id:uid(),date:$('#msDate').value,time:$('#msTime').value,type:$('#msType').value,qty,origin:$('#msOrigin').value,user:$('#msUser').value});saveState();closeModal();renderSal();renderCharts();showToast('Movimiento guardado')}
function renderEmpleados(){
  $('#page-empleados').innerHTML = `${slideTitle(8,'Empleados','Gestión clara del personal')}
  <div class="panel employees-panel">
    <div class="employee-actions"><button class="btn primary" id="empAdd">+ Agregar</button><button class="btn" id="empEdit">${svg.edit} Modificar</button><button class="btn" id="empDown">👤× Dar de baja</button><button class="btn" id="empExport">${svg.download} Exportar</button></div>
    <div class="table-wrap" id="empTable"></div><div class="center-link">Ver todos los empleados ›</div>
  </div>
  <div class="employee-feature-grid">
    ${note('👤+','Alta rápida','Agrega nuevos empleados de forma sencilla con toda la información necesaria.')}
    ${note('✎','Edición eficiente','Modifica los datos del personal de manera ágil y segura.')}
    ${note('👤×','Bajas controladas','Da de baja empleados cuando sea necesario, manteniendo el historial.')}
    ${note('🛡','Administración ágil','Gestiona tu equipo con claridad y control desde un solo lugar.')}
  </div>`;
  $('#empAdd').onclick=()=>openEmployeeModal(); $('#empEdit').onclick=()=>openEmployeeModal(state.employees[0]?.id); $('#empDown').onclick=()=>{if(state.employees[0]){state.employees[0].estado='Inactivo';saveState();renderEmpleados();showToast('Primer empleado dado de baja como ejemplo')}}; $('#empExport').onclick=()=>exportCSV('empleados.csv',state.employees); renderEmployeeTable();
}
function renderEmployeeTable(){
  $('#empTable').innerHTML=`<table><thead><tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Área</th><th>Turno</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>${state.employees.map(e=>`<tr><td>${e.id}</td><td>${e.nombre}</td><td>${e.apellido}</td><td>${e.area}</td><td>${e.turno}</td><td><span class="status ${statusClass(e.estado)}">${e.estado}</span></td><td><button class="btn small" onclick="openEmployeeModal('${e.id}')">${svg.edit}</button><button class="btn small" onclick="toggleEmployee('${e.id}')">⋯</button></td></tr>`).join('')}</tbody></table>`;
}
function toggleEmployee(id){const e=state.employees.find(x=>x.id===id); if(!e)return; e.estado=e.estado==='Activo'?'Inactivo':'Activo'; saveState(); renderEmpleados(); showToast('Estado del empleado actualizado')}
function openEmployeeModal(id=null){
  const e=id?state.employees.find(x=>x.id===id):{id:String(Math.max(100,...state.employees.map(x=>number(x.id)))+1),nombre:'',apellido:'',area:'Producción',turno:'Mañana',estado:'Activo',legajo:''};
  openModal(id?'Modificar empleado':'Agregar empleado', `<div class="modal-grid"><div class="field"><label>ID</label><input id="meId" class="input" value="${e.id}"></div><div class="field"><label>Legajo</label><input id="meLegajo" class="input" value="${e.legajo||''}"></div><div class="field"><label>Nombre</label><input id="meNombre" class="input" value="${e.nombre}"></div><div class="field"><label>Apellido</label><input id="meApellido" class="input" value="${e.apellido}"></div><div class="field"><label>Área</label><select id="meArea">${sectorOptions().map(s=>`<option ${s===e.area?'selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>Turno</label><select id="meTurno">${['Mañana','Tarde','Intermedio','Cortado','Noche'].map(s=>`<option ${s===e.turno?'selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>Estado</label><select id="meEstado"><option ${e.estado==='Activo'?'selected':''}>Activo</option><option ${e.estado==='Inactivo'?'selected':''}>Inactivo</option></select></div></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveEmployeeModal('${id||''}')">Guardar</button></div>`)
}
function saveEmployeeModal(id){
  const data={id:$('#meId').value,nombre:$('#meNombre').value,apellido:$('#meApellido').value,area:$('#meArea').value,turno:$('#meTurno').value,estado:$('#meEstado').value,legajo:$('#meLegajo').value};
  if(!data.nombre||!data.apellido){showToast('Completá nombre y apellido');return}
  const ix=state.employees.findIndex(e=>e.id===id); if(ix>=0) state.employees[ix]=data; else state.employees.push(data); saveState(); closeModal(); renderAll(); showToast('Empleado guardado');
}
function openModal(title,html){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=html;$('#modalBackdrop').classList.add('show')}
function closeModal(){$('#modalBackdrop').classList.remove('show')}
function renderCharts(){setTimeout(()=>{drawDashboardCharts();drawSaltChart();},60)}
function resizeCharts(){Object.values(charts).forEach(c=>{try{c.resize()}catch(e){}})}
function chart(id,config){if(!window.Chart||!$('#'+id))return; if(charts[id]) charts[id].destroy(); charts[id]=new Chart($('#'+id),config)}
function drawDashboardCharts(){
  chart('chartDashLine',{type:'line',data:{labels:['06:00','08:00','10:00','12:00','14:00','16:00','18:00'],datasets:[{label:'Producción',data:[220,380,570,430,890,820,460],tension:.35,fill:true,borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,.08)',pointBackgroundColor:'#2563EB'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'#EEF2F7'}},x:{grid:{display:false}}}}});
  const present=state.attendance.filter(a=>a.estado==='Presente').length||3, absent=state.attendance.filter(a=>a.estado==='Ausente').length||1;
  chart('chartDashDonut',{type:'doughnut',data:{labels:['Presentes','Ausentes'],datasets:[{data:[present,absent],backgroundColor:['#16A34A','#EF4444'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'right'}}}});
}
function drawSaltChart(){
  chart('chartSalt',{type:'line',data:{labels:['10/05','11/05','12/05','13/05','14/05','15/05','16/05'],datasets:[{label:'Consumo (kg)',data:[48,43,130,95,58,70,85],borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,.08)',pointBackgroundColor:'#2563EB',fill:true,tension:.25}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{grid:{color:'#EEF2F7'},beginAtZero:true},x:{grid:{color:'#EEF2F7'}}}}});
}
function boot(){
  renderNav(); renderAll();
  $('#menuToggle').onclick=()=>$('#sidebar').classList.toggle('open');
  $('#modalClose').onclick=closeModal; $('#modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal()});
  $('#backupBtn').onclick=()=>downloadText(`backup_panel_planta_${todayISO()}.json`,JSON.stringify(state,null,2),'application/json');
  window.addEventListener('resize',()=>setTimeout(resizeCharts,120));
}
document.addEventListener('DOMContentLoaded',boot);
</script>
</body>
</html>
