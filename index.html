const {useState,useEffect,useMemo,useRef}=React;

/* ────────── UTILS ────────── */
function makeId(p){return `${p}-${Math.random().toString(36).slice(2,9)}`;}
function formatDateShort(date){
  const dd=String(date.getDate()).padStart(2,'0');
  const mm=String(date.getMonth()+1).padStart(2,'0');
  const yy=String(date.getFullYear()).slice(-2);
  return `${dd}/${mm}/${yy}`;
}
function formatDateISO(date){
  const yyyy=String(date.getFullYear());
  const mm=String(date.getMonth()+1).padStart(2,'0');
  const dd=String(date.getDate()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}`;
}
function parseDateObj(value){
  if(value===undefined||value===null||value==='')return null;
  if(value instanceof Date && !isNaN(value))return new Date(value.getFullYear(),value.getMonth(),value.getDate(),12,0,0);
  if(typeof value==='number' && Number.isFinite(value)){
    const excelEpoch=new Date(Date.UTC(1899,11,30));
    const d=new Date(excelEpoch.getTime()+Math.round(value)*86400000);
    return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),12,0,0);
  }
  const s=String(value).trim();
  if(!s)return null;
  if(/^\d{5}(?:\.\d+)?$/.test(s)){
    const num=Number(s);
    if(Number.isFinite(num)){
      const excelEpoch=new Date(Date.UTC(1899,11,30));
      const d=new Date(excelEpoch.getTime()+Math.round(num)*86400000);
      return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),12,0,0);
    }
  }
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m)return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]),12,0,0);
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){
    const a=Number(m[1]), b=Number(m[2]);
    const year=Number(m[3].length===2?`20${m[3]}`:m[3]);
    let day=a, month=b;
    if(a>12 && b<=12){day=a; month=b;}
    else if(b>12 && a<=12){month=a; day=b;}
    else {day=a; month=b;}
    const d=new Date(year,month-1,day,12,0,0);
    if(!isNaN(d))return d;
  }
  const parsed=new Date(s);
  if(!isNaN(parsed))return new Date(parsed.getFullYear(),parsed.getMonth(),parsed.getDate(),12,0,0);
  return null;
}
function todayValue(){return formatDateShort(new Date());}
function fmtDate(ds){const d=parseDateObj(ds);return d?formatDateShort(d):(ds||'—');}
function dateSortKey(value){
  const d=parseDateObj(value);
  if(!d)return '00000000';
  const yyyy=String(d.getFullYear());
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return `${yyyy}${mm}${dd}`;
}
function compareDateDesc(a,b){return dateSortKey(b).localeCompare(dateSortKey(a));}
function compareDateAsc(a,b){return dateSortKey(a).localeCompare(dateSortKey(b));}
function dateInRange(value,from,to){
  const key=dateSortKey(value);
  if(from && key<dateSortKey(from))return false;
  if(to && key>dateSortKey(to))return false;
  return true;
}
function cleanDateInput(value){return String(value||'').replace(/[^\d\/\-]/g,'').slice(0,10);}
function normalizeDateInput(value,fallback=''){
  const d=parseDateObj(value);
  return d?formatDateShort(d):(fallback||cleanDateInput(value));
}
function toInputDate(value){
  const d=parseDateObj(value);
  return d?formatDateISO(d):'';
}
function fromInputDate(value,fallback=''){
  if(!value)return '';
  const m=String(value).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return `${m[3]}/${m[2]}/${m[1].slice(-2)}`;
  return normalizeDateInput(value,fallback);
}
function getWeekNum(ds){
  const d=parseDateObj(ds);
  if(!d)return '';
  const fj=new Date(d.getFullYear(),0,1,12,0,0);
  return Math.ceil((Math.floor((d-fj)/86400000)+fj.getDay()+1)/7);
}
function normKey(v){return String(v??'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]/g,'');}
function normText(v){return String(v??'').trim();}

function toIsoDate(value,fallback=''){
  const d=parseDateObj(value);
  return d?formatDateShort(d):(fallback||todayValue());
}
function nameTokens(name){
  return String(name||'').toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim().split(' ').filter(Boolean);
}
function findEmployeeMatch(employees,rawLegajo='',rawName=''){
  const legajo=String(rawLegajo||'').trim();
  if(legajo){
    const exactByLegajo=employees.find(e=>String(e.legajo)===legajo);
    if(exactByLegajo)return exactByLegajo;
  }
  const name=String(rawName||'').trim();
  if(!name)return null;
  const nk=normKey(name);
  let exact=employees.find(e=>normKey(e.nombre)===nk);
  if(exact)return exact;
  let contains=employees.find(e=>normKey(e.nombre).includes(nk)||nk.includes(normKey(e.nombre)));
  if(contains)return contains;
  const srcAll=nameTokens(name);
  const srcLong=srcAll.filter(t=>t.length>1);
  const srcShort=srcAll.filter(t=>t.length===1);
  let best=null;
  let bestScore=-1;
  employees.forEach(emp=>{
    const empAll=nameTokens(emp.nombre);
    const empLong=empAll.filter(t=>t.length>1);
    let score=0;
    if(srcAll[0]&&empAll[0]&&srcAll[0]===empAll[0])score+=4;
    if(srcAll[srcAll.length-1]&&empAll[empAll.length-1]&&srcAll[srcAll.length-1]===empAll[empAll.length-1])score+=2;
    const common=srcLong.filter(t=>empLong.includes(t)).length;
    score+=common*2;
    const initialMatches=srcShort.filter(t=>empLong.some(et=>et.startsWith(t))).length;
    score+=initialMatches;
    if(score>bestScore){bestScore=score;best=emp;}
  });
  const minScore=srcLong.length>=2?4:3;
  return bestScore>=minScore?best:null;
}

function calcHours(e,s){if(!e||!s)return 0;const [sh,sm]=e.split(':').map(Number),[eh,em]=s.split(':').map(Number);let end=eh*60+em;const st=sh*60+sm;if(end<st)end+=1440;return Number(((end-st)/60).toFixed(2));}
function attScore(s){if(s==='Presente')return 100;if(s==='Tarde')return 80;if(s==='Media jornada')return 60;if(s==='Ausente')return 0;return null;}
function qualScore(q){if(q==='Sin errores')return 100;if(q==='1 error leve')return 85;if(q==='2 errores')return 70;if(q==='Error grave')return 40;return null;}
function semColor(sc,tipo,est){if(tipo!=='Operario')return 'NA';if(est==='Ausente')return 'ROJO';if(sc===null)return 'NA';return sc>=85?'VERDE':sc>=70?'AMARILLO':'ROJO';}
function defaultEntrada(turno){return turno==='Noche'?'22:00':'08:00';}
function defaultSalida(turno){return turno==='Noche'?'06:00':'17:00';}
function cleanTime(value){
  const s=String(value??'').trim();
  const m=s.match(/^(\d{1,2}):(\d{2})$/);
  if(!m)return '';
  const hh=String(Math.min(23,Math.max(0,Number(m[1])))).padStart(2,'0');
  const mm=String(Math.min(59,Math.max(0,Number(m[2])))).padStart(2,'0');
  return `${hh}:${mm}`;
}
function timeToMinutes(value){
  const t=cleanTime(value);
  if(!t)return null;
  const [h,m]=t.split(':').map(Number);
  return h*60+m;
}
function scheduleMinutes(turno,kind){
  return timeToMinutes(kind==='entrada'?defaultEntrada(turno):defaultSalida(turno));
}
function relativeTimeDiff(actual,expected,kind){
  const a=timeToMinutes(actual),e=timeToMinutes(expected);
  if(a===null||e===null)return null;
  let diff=a-e;
  if(kind==='salida'&&diff<-720)diff+=1440;
  if(kind==='entrada'&&diff>720)diff-=1440;
  return diff;
}
function formatMinDiff(mins,positiveLabel,negativeLabel){
  if(mins===null||mins===undefined)return 'Sin fichaje';
  if(Math.abs(mins)<=5)return 'En hora';
  return mins>0?`${positiveLabel} +${mins}m`:`${negativeLabel} ${mins}m`;
}
function entryStatus(rec){
  const diff=relativeTimeDiff(rec?.entrada,defaultEntrada(rec?.turno),'entrada');
  return formatMinDiff(diff,'Tarde','Temprano');
}
function exitStatus(rec){
  const diff=relativeTimeDiff(rec?.salida,defaultSalida(rec?.turno),'salida');
  return formatMinDiff(diff,'Se quedó','Se fue antes');
}

function sortByName(arr){return [...arr].sort((a,b)=>String(a.nombre||'').localeCompare(String(b.nombre||'')));}
function weekColor(week){const colors=['#e0e7ff','#d1fae5','#fef3c7','#ffe4e6','#ede9fe','#e0f2fe','#ffedd5'];return colors[Math.abs(Number(week)||0)%colors.length];}
function unique(arr){return Array.from(new Set(arr));}

function chartNameParts(nombre){
  const parts=nameTokens(nombre);
  if(!parts.length)return ['—'];
  if(parts.length===1)return [parts[0]];
  return [parts[0],parts[1]];
}
function seguimientoChartLabel(it){
  const parts=chartNameParts(it?.nombre||'');
  return it?.semana? [`S${it.semana}`,...parts] : parts;
}
function seguimientoChartWidth(items){
  const count=Array.isArray(items)?items.length:0;
  return Math.max(760,count*58);
}
function dayTitle(value){
  const d=parseDateObj(value);
  if(!d)return fmtDate(value);
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  return `${days[d.getDay()]} ${formatDateShort(d)}`;
}
function addDaysToDateStr(value,days){
  const d=parseDateObj(value)||new Date();
  d.setDate(d.getDate()+days);
  return formatDateShort(d);
}
function daySectionColor(index){
  const colors=['#c4b5fd','#fdba74','#86efac','#93c5fd','#f9a8d4','#fcd34d','#67e8f9'];
  return colors[Math.abs(Number(index)||0)%colors.length];
}

const SAL_BAG_KG=25;
const SAL_PALLET_BAGS=48;
const SAL_DEFAULT_PURCHASE_PALLETS=22;
const DEFAULT_SALT_PLANTS=['Deltacar','Alba','Cooperativa Parana','Santa Ines','Suipacha'];
function defaultSaltPlants(){return DEFAULT_SALT_PLANTS.map((nombre,i)=>({id:`planta-${i+1}`,nombre,activa:true}));}
function round2(n){return Number((Number(n||0)).toFixed(2));}
function saltConversion(base,cantidad){
  const qty=Number(String(cantidad??0).replace(',','.'))||0;
  if(base==='kg')return {kg:round2(qty),bolsas:round2(qty/SAL_BAG_KG),pallets:round2(qty/(SAL_BAG_KG*SAL_PALLET_BAGS))};
  if(base==='pallets'){
    const bolsas=qty*SAL_PALLET_BAGS;
    return {kg:round2(bolsas*SAL_BAG_KG),bolsas:round2(bolsas),pallets:round2(qty)};
  }
  const bolsas=qty;
  return {kg:round2(bolsas*SAL_BAG_KG),bolsas:round2(bolsas),pallets:round2(bolsas/SAL_PALLET_BAGS)};
}
function saltTypeDirection(tipo){return ['Ingreso compra','Ajuste +'].includes(tipo)?1:-1;}
function saltTypeMeta(tipo){
  if(tipo==='Ingreso compra')return {bg:C.emeraldL,color:C.emeraldD,border:C.emerald,label:'Ingreso compra'};
  if(tipo==='Consumo planta')return {bg:C.amberL,color:C.amberD,border:C.amber,label:'Consumo planta'};
  if(tipo==='Salida frigorifico')return {bg:C.skyL,color:C.skyD,border:C.sky,label:'Salida frigorifico'};
  if(tipo==='Ajuste +')return {bg:C.violetL,color:C.violetD,border:C.violet,label:'Ajuste +'};
  if(tipo==='Ajuste -')return {bg:C.roseL,color:C.roseD,border:C.rose,label:'Ajuste -'};
  return {bg:C.s100,color:C.s700,border:C.s300,label:tipo||'—'};
}
function buildSaltMove(fields){
  const fecha=normalizeDateInput(fields.fecha,todayValue());
  const base=fields.base||'bolsas';
  const tipo=fields.tipo||'Consumo planta';
  const cantidad=Number(String(fields.cantidad??0).replace(',','.'))||0;
  const conv=saltConversion(base,cantidad);
  return {
    id:fields.id||makeId('sal'),
    fecha,
    tipo,
    base,
    cantidad,
    kg:conv.kg,
    bolsas:conv.bolsas,
    pallets:conv.pallets,
    signo:saltTypeDirection(tipo),
    frigorifico:(fields.frigorifico||'').trim(),
    sector:(fields.sector||'').trim(),
    observaciones:(fields.observaciones||'').trim()
  };
}
function normalizeLoadedSaltMove(move){return buildSaltMove({...move,id:move.id});}
function signedSalt(move,field){return round2((Number(move.signo||1))*Number(move[field]||0));}

function computeRecord(fields){
  const e=fields.employee;
  const estadoDia=fields.estadoDia||'Presente';
  const entrada=cleanTime(fields.entrada);
  const salida=cleanTime(fields.salida);
  const produccionReal=Number(fields.produccionReal||0);
  const calidad=fields.calidad||(e.tipoEmpleado==='Operario'?'Sin errores':'No aplica');
  const horas=calcHours(entrada,salida);
  const puntajeAsistencia=attScore(estadoDia);
  const puntajeCalidad=qualScore(calidad);
  const cumplimiento=e.metaDiaria>0?Number(((produccionReal/e.metaDiaria)*100).toFixed(0)):0;
  const puntajeRendimiento=e.metaDiaria>0?Math.min(cumplimiento,120):null;
  const puntajeFinal=e.tipoEmpleado!=='Operario'||puntajeAsistencia===null?null:Math.round(puntajeAsistencia*0.4+(puntajeRendimiento??0)*0.4+(puntajeCalidad??100)*0.2);
  return {
    id:fields.id||makeId('rec'),
    fecha:fields.fecha,
    semana:getWeekNum(fields.fecha),
    legajo:e.legajo,
    nombre:e.nombre,
    sector:fields.sector||e.sector,
    turno:e.turno,
    tipoEmpleado:e.tipoEmpleado,
    supervisor:e.supervisor,
    estadoDia,
    entrada,
    salida,
    horas,
    presenteOperativo:e.tipoEmpleado==='Operario'&&['Presente','Tarde','Media jornada'].includes(estadoDia)?'Sí':'No',
    produccionReal,
    metaDiaria:Number(e.metaDiaria||0),
    cumplimiento,
    calidad,
    puntajeAsistencia,
    puntajeRendimiento,
    puntajeCalidad,
    puntajeFinal,
    semaforo:semColor(puntajeFinal,e.tipoEmpleado,estadoDia),
    observaciones:fields.observaciones||''
  };
}
function upsertAttendance(records, employee, payload){
  const existing=records.find(r=>r.fecha===payload.fecha&&String(r.legajo)===String(employee.legajo));
  const next=computeRecord({
    id:existing?.id,
    employee,
    fecha:payload.fecha,
    estadoDia:payload.estadoDia,
    entrada:payload.entrada,
    salida:payload.salida,
    produccionReal:existing?.produccionReal||0,
    calidad:existing?.calidad||(employee.tipoEmpleado==='Operario'?'Sin errores':'No aplica'),
    observaciones:[existing?.observaciones,payload.observaciones].filter(Boolean).join(existing?.observaciones&&payload.observaciones?' | ':'')
  });
  return existing?records.map(r=>r.id===existing.id?next:r):[next,...records];
}

function upsertProduction(records, employee, payload){
  const existing=records.find(r=>r.fecha===payload.fecha&&String(r.legajo)===String(employee.legajo));
  const next=computeRecord({
    id:existing?.id,
    employee,
    fecha:payload.fecha,
    sector:payload.sector||existing?.sector||employee.sector,
    estadoDia:existing?.estadoDia||'Presente',
    entrada:existing?.entrada||'',
    salida:existing?.salida||'',
    produccionReal:Number(payload.produccionReal||0),
    calidad:payload.calidad||(employee.tipoEmpleado==='Operario'?'Sin errores':'No aplica'),
    observaciones:[existing?.observaciones,payload.observaciones].filter(Boolean).join(existing?.observaciones&&payload.observaciones?' | ':'')
  });
  return existing?records.map(r=>r.id===existing.id?next:r):[next,...records];
}

function exportCsv(filename,headers,rows){
  const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  const csv=[headers.map(esc).join(','),...rows.map(r=>r.map(esc).join(','))].join('\n');
  const url=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}
function safeSheetName(name,fallback='Hoja'){
  const cleaned=String(name||fallback).replace(/[\\\/?*\[\]:]/g,'-').trim();
  const base=(cleaned||fallback).slice(0,31);
  return base||fallback;
}
function setSheetColumnWidths(ws,rows){
  if(!ws||!rows||!rows.length)return;
  const isMatrix=Array.isArray(rows[0]);
  const widths=[];
  if(isMatrix){
    rows.forEach(row=>{
      (row||[]).forEach((cell,i)=>{
        const len=String(cell??'').length;
        widths[i]=Math.max(widths[i]||10,Math.min(42,len+2));
      });
    });
  } else {
    const headers=Object.keys(rows[0]||{});
    headers.forEach((h,i)=>{widths[i]=Math.max(10,Math.min(42,String(h).length+2));});
    rows.forEach(row=>{
      headers.forEach((h,i)=>{
        const len=String((row&&row[h])??'').length;
        widths[i]=Math.max(widths[i]||10,Math.min(42,len+2));
      });
    });
  }
  ws['!cols']=widths.map(w=>({wch:w}));
}
function appendJsonSheet(wb,name,rows){
  const data=(rows&&rows.length)?rows:[{Estado:'Sin datos'}];
  const ws=XLSX.utils.json_to_sheet(data);
  setSheetColumnWidths(ws,data);
  XLSX.utils.book_append_sheet(wb,ws,safeSheetName(name));
}
function appendAoaSheet(wb,name,rows){
  const data=(rows&&rows.length)?rows:[['Sin datos']];
  const ws=XLSX.utils.aoa_to_sheet(data);
  setSheetColumnWidths(ws,data);
  XLSX.utils.book_append_sheet(wb,ws,safeSheetName(name));
}
function parseFlexibleFile(file, onData, onError){
  if(!file){onError(['No seleccionaste archivo.']);return;}
  const ext=(file.name||'').split('.').pop().toLowerCase();
  const reader=new FileReader();
  if(['xlsx','xls','xlsm'].includes(ext)){
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
        const sheet=wb.Sheets[wb.SheetNames[0]];
        const data=XLSX.utils.sheet_to_json(sheet,{defval:'',raw:true,dateNF:'dd/mm/yyyy'});
        onData(data);
      }catch(err){onError(['No se pudo leer el Excel.']);}
    };
    reader.readAsArrayBuffer(file);
  }else{
    reader.onload=e=>{
      try{
        const text=String(e.target.result||'');
        const sep=text.includes(';')?';':(text.includes('\t')?'\t':',');
        const lines=text.split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){onError(['Archivo vacío o sin datos.']);return;}
        const headers=lines[0].split(sep).map(h=>h.replace(/"/g,'').trim());
        const rows=lines.slice(1).map(line=>{const vals=line.split(sep).map(v=>v.replace(/"/g,'').trim());const obj={};headers.forEach((h,i)=>obj[h]=vals[i]??'');return obj;});
        onData(rows);
      }catch(err){onError(['No se pudo leer el archivo.']);}
    };
    reader.readAsText(file,'UTF-8');
  }
}


function sheetObjectsByAliases(wb, aliases){
  if(!wb||!wb.SheetNames)return [];
  const aliasKeys=(aliases||[]).map(a=>normKey(a));
  const sheetName=wb.SheetNames.find(name=>{
    const nk=normKey(name);
    return aliasKeys.some(a=>nk===a||nk.includes(a)||a.includes(nk));
  });
  if(!sheetName)return [];
  const sheet=wb.Sheets[sheetName];
  return XLSX.utils.sheet_to_json(sheet,{defval:'',raw:true,dateNF:'dd/mm/yyyy'});
}
function rowToNormalizedObject(row){
  const out={};
  Object.entries(row||{}).forEach(([k,v])=>out[normKey(k)]=normText(v));
  return out;
}
function parseWorkbookEmployeeRow(row, defaultActive=true){
  const o=rowToNormalizedObject(row);
  if(!Object.values(o).some(Boolean))return null;
  const tipoRaw=o.tipo||o.tipoempleado||'Operario';
  const tipo=ETYPES.find(t=>normKey(t)===normKey(tipoRaw))||'Operario';
  const turno=TURNOS.find(t=>normKey(t)===normKey(o.turno||''))||(o.turno||'Día');
  const estado=normKey(o.estado||'');
  const activo=estado?!(estado.includes('baja')||estado.includes('inactivo')||estado==='no'):defaultActive;
  return {
    id:makeId('emp'),

function parseWorkbookSaltRow(row){

  if(!Object.values(o).some(Boolean))return null;
  let base='bolsas';
  let cantidad=Number(String(o.cantidad||'').replace(',','.'));
  if(!Number.isFinite(cantidad)||cantidad===0){
    if(o.bolsas){base='bolsas';cantidad=Number(String(o.bolsas).replace(',','.'))||0;}
    else if(o.pallets||o.palets){base='pallets';cantidad=Number(String(o.pallets||o.palets).replace(',','.'))||0;}
    else {base='kg';cantidad=Number(String(o.kg).replace(',','.'))||0;}
  } else {
    const baseRaw=normKey(o.base||'');
    if(baseRaw.includes('pallet'))base='pallets';

    else base='bolsas';
  }
  return normalizeLoadedSaltMove({
    id:makeId('sal'),
    fecha:normalizeDateInput(o.fecha,todayValue()),

    observaciones:o.observaciones||''
  });
}
function parseWorkbookPlantRow(row){

function normalizeChartNumber(v){

  const num=typeof v==='number'?v:Number(String(v).replace(',','.'));
  return Number.isFinite(num)?num:null;
}
function BarChart({labels,datasets,height=220,stacked=false}){

      data:(Array.isArray(ds.data)?ds.data:[]).map(normalizeChartNumber),
      borderRadius:ds.borderRadius??4,
      maxBarThickness:ds.maxBarThickness??42
    }));
    const ctx=ref.current.getContext('2d');

      type:'bar',

        responsive:true,

function ImportAttendanceModal({onClose,onImport,employees=[]}){
  const [step,setStep]=useState('upload');const [preview,setPreview]=useState([]);const [errors,setErrors]=useState([]);const [drag,setDrag]=useState(false);const fileRef=useRef();

  function handleData(data){
    const rows=[];const errs=[];let lastDate=todayValue();
    const normalized=(data||[]).map(raw=>{
      const obj={};
      Object.entries(raw||{}).forEach(([k,v])=>{const nk=normKey(k);obj[nk]=nk==='fecha'?v:normText(v);});
      return obj;
    }).filter(obj=>!Object.values(obj).every(v=>!v));

    const looksLikeMarcaciones=normalized.length>0&&normalized.every(obj=>('empleado' in obj||'nombre' in obj)&&('fecha' in obj)&&('marcacion' in obj));
    if(looksLikeMarcaciones){
      const grouped=new Map();
      normalized.forEach((obj,idx)=>{
        const nombreRaw=obj.empleado||obj.nombre||'';
        const fecha=obj.fecha?toIsoDate(obj.fecha,lastDate):lastDate;
        if(obj.fecha)lastDate=fecha;
        const emp=findEmployeeMatch(employees,obj.legajo||'',nombreRaw);
        if(!emp){errs.push(`Fila ${idx+2}: "${nombreRaw}" no encontrado en personal`);return;}
        const key=`${fecha}__${emp.legajo}`;
        const mark=String(obj.marcacion||'').trim();
        const mm=mark.match(/(\d{1,2}:\d{2}).*\((E|S)\)/i);
        if(!grouped.has(key))grouped.set(key,{fecha,legajo:emp.legajo,nombre:emp.nombre,estadoDia:'Presente',entrada:'',salida:'',observaciones:'Importado desde fichaje'});
        if(mm){
          const hora=cleanTime(mm[1]);
          const tipo=(mm[2]||'').toUpperCase();
          const item=grouped.get(key);
          const currentEntrada=item.entrada;
          const currentSalida=item.salida;
          if(tipo==='E'&&(!currentEntrada||timeToMinutes(hora)<timeToMinutes(currentEntrada)))item.entrada=hora;
          if(tipo==='S'&&(!currentSalida||relativeTimeDiff(hora,currentSalida,'salida')>0))item.salida=hora;
        }
      });
      const groupedRows=Array.from(grouped.values());
      setPreview(groupedRows);setErrors(errs);if(groupedRows.length>0)setStep('preview');else setErrors(errs.length?errs:['No se encontraron filas válidas.']);
      return;
    }

    normalized.forEach((obj,idx)=>{
      const nombreRaw=obj.operariosupervisor||obj.nombre||obj.empleado||obj.apellidoynombre||'';
      const isPresentesFechaFormat=('operariosupervisor' in obj)||('presente' in obj)||('ausente' in obj);

      if(isPresentesFechaFormat){
        const fecha=obj.fecha?toIsoDate(obj.fecha,lastDate):lastDate;
        if(obj.fecha)lastDate=fecha;
        if(!nombreRaw)return;
        const emp=findEmployeeMatch(employees,obj.legajo||'',nombreRaw);
        if(!emp){errs.push(`Fila ${idx+2}: "${nombreRaw}" no encontrado en personal`);return;}
        const presMark=String(obj.presente||'').trim().toUpperCase();
        const ausMark=String(obj.ausente||'').trim().toUpperCase();
        let estadoDia='';
        if(presMark==='1'||presMark==='SI'||presMark==='SÍ')estadoDia='Presente';
        else if(ausMark==='X'||ausMark==='1'||ausMark==='SI'||ausMark==='SÍ')estadoDia='Ausente';
        else if(obj.estado||obj.estadodia)estadoDia=DAY_ST.find(s=>normKey(s)===normKey(obj.estadodia||obj.estado||''))||'';
        if(!estadoDia){errs.push(`Fila ${idx+2}: no se pudo interpretar si "${nombreRaw}" está presente o ausente`);return;}
        rows.push({fecha,legajo:emp.legajo,nombre:emp.nombre,estadoDia,entrada:'',salida:'',observaciones:'Importado desde PRESENTES DE LA FECHA'});
        return;
      }

      const fecha=obj.fecha?toIsoDate(obj.fecha,lastDate):lastDate;
      if(obj.fecha)lastDate=fecha;
      const emp=findEmployeeMatch(employees,obj.legajo||obj.codigo||obj.id||'',nombreRaw);
      if(!emp){errs.push(`Fila ${idx+2}: empleado no encontrado`);return;}
      const estadoDia=DAY_ST.find(s=>normKey(s)===normKey(obj.estadodia||obj.estado||''))||'Presente';
      const entrada=cleanTime(obj.entrada||obj.e||obj.horariofichajeentrada||obj.horarioentrada||'');
      const salida=cleanTime(obj.salida||obj.s||obj.horariofichajesalida||obj.horariosalida||'');
      rows.push({fecha,legajo:emp.legajo,nombre:emp.nombre,estadoDia,entrada,salida,observaciones:obj.observaciones||''});
    });
    setPreview(rows);setErrors(errs);if(rows.length>0)setStep('preview');else setErrors(errs.length?errs:['No se encontraron filas válidas.']);
  }

  return <BaseModal title='🟢 Importar presentismo' subtitle='Entiende PRESENTES DE LA FECHA y también fichaje/marcaciones con E y S exactos' onClose={onClose} color='emerald'>
    {step==='upload'&&<div>
      <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);parseFlexibleFile(e.dataTransfer.files[0],handleData,setErrors);}} onClick={()=>fileRef.current.click()} style={{border:`2.5px dashed ${drag?C.emerald:C.s300}`,borderRadius:'14px',padding:'36px',textAlign:'center',cursor:'pointer',background:drag?C.emeraldL:C.s50,marginBottom:'16px'}}>
        <div style={{fontSize:'40px',marginBottom:'10px'}}>🟢</div>
        <div style={{fontSize:'14px',fontWeight:700,color:C.s700}}>Arrastrá el archivo PRESENTES DE LA FECHA o hacé click</div>
        <div style={{fontSize:'12px',color:C.s500,marginTop:'4px'}}>Reconoce PRESENTES DE LA FECHA y también marcaciones con Empleado / Fecha / Marcacion</div>
        <input ref={fileRef} type='file' accept='.csv,.xlsx,.xls' style={{display:'none'}} onChange={e=>parseFlexibleFile(e.target.files[0],handleData,setErrors)}/>
      </div>
      {errors.length>0&&<div style={{padding:'12px',background:C.roseL,borderRadius:'10px'}}>{errors.map((e,i)=><div key={i} style={{fontSize:'12px',color:C.roseD}}>• {e}</div>)}</div>}
    </div>}
    {step==='preview'&&<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}><div style={{fontWeight:700,color:C.s800}}>{preview.length} filas para importar</div><BtnS onClick={()=>{setStep('upload');setPreview([]);setErrors([]);}}>← Cambiar</BtnS></div>
      {errors.length>0&&<div style={{marginBottom:'12px',padding:'12px',background:C.amberL,borderRadius:'10px'}}>{errors.map((e,i)=><div key={i} style={{fontSize:'11px',color:C.amberD}}>• {e}</div>)}</div>}
      <div style={{maxHeight:'320px',overflow:'auto',borderRadius:'10px',border:`1px solid ${C.s200}`,marginBottom:'16px'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}><thead style={{position:'sticky',top:0,background:`linear-gradient(90deg,${C.emeraldL},${C.indigoL})`}}><tr>{['Fecha','Legajo','Nombre','Estado','E','S'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',fontWeight:700,color:C.emeraldD}}>{h}</th>)}</tr></thead><tbody>{preview.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.s100}`,background:i%2===0?C.white:C.s50}}><td style={{padding:'7px 10px'}}>{fmtDate(r.fecha)}</td><td style={{padding:'7px 10px',fontFamily:'monospace'}}>{r.legajo}</td><td style={{padding:'7px 10px',fontWeight:600}}>{r.nombre}</td><td style={{padding:'7px 10px'}}><StatusBadge value={r.estadoDia}/></td><td style={{padding:'7px 10px'}}>{r.entrada||'—'}</td><td style={{padding:'7px 10px'}}>{r.salida||'—'}</td></tr>)}</tbody></table>
      </div>
      <div style={{display:'flex',gap:'10px'}}><BtnP onClick={()=>{onImport(preview);setStep('done');}}>✅ Importar {preview.length}</BtnP><BtnN onClick={onClose}>Cancelar</BtnN></div>
    </div>}
    {step==='done'&&<div style={{textAlign:'center',padding:'24px 0'}}><div style={{fontSize:'48px',marginBottom:'12px'}}>✅</div><div style={{fontSize:'16px',fontWeight:800,color:C.emeraldD,marginBottom:'8px'}}>Presentismo importado</div><BtnP onClick={onClose}>Cerrar</BtnP></div>}

function ImportDailyModal({onClose,onImport,employees=[]}){
  const [step,setStep]=useState('upload');const [preview,setPreview]=useState([]);const [errors,setErrors]=useState([]);const [drag,setDrag]=useState(false);const fileRef=useRef();

  function parseProduccionXDiaWorkbook(wb){
    const rows=[];const errs=[];
    wb.SheetNames.forEach(shName=>{
      const sh=wb.Sheets[shName];
      const matrix=XLSX.utils.sheet_to_json(sh,{header:1,defval:'',raw:false});
      const headerIdx=matrix.findIndex(row=>{
        const keys=(row||[]).map(c=>normKey(c));
        return keys.includes('fecha')&&keys.includes('empleado')&&keys.includes('sector')&&keys.includes('cantidadproducida');
      });
      if(headerIdx<0)return;
      const headers=(matrix[headerIdx]||[]).map(c=>normKey(c));
      const ixFecha=headers.findIndex(h=>h==='fecha');
      const ixEmpleado=headers.findIndex(h=>h==='empleado'||h==='operario');
      const ixSector=headers.findIndex(h=>h==='sector');
      const ixCantidad=headers.findIndex(h=>h==='cantidadproducida'||h==='cantidad'||h==='produccion'||h==='produccionreal');
      const ixObs=headers.findIndex(h=>h==='observaciones'||h==='observacion');
      for(let i=headerIdx+1;i<matrix.length;i++){
        const row=matrix[i]||[];
        const fechaRaw=row[ixFecha];
        const nombreRaw=normText(row[ixEmpleado]);
        const sectorRaw=normText(row[ixSector]);
        const cantidadRaw=row[ixCantidad];
        const observaciones=ixObs>=0?normText(row[ixObs]):'';
        if(!fechaRaw&&!nombreRaw&&!sectorRaw&&!cantidadRaw)continue;
        const cantidad=Number(String(cantidadRaw??'').replace(',','.'));
        if(!nombreRaw||!sectorRaw||!Number.isFinite(cantidad))continue;
        const emp=findEmployeeMatch(employees,'',nombreRaw);
        if(!emp){errs.push(`Fila ${i+1}: "${nombreRaw}" no encontrado en personal`);continue;}
        rows.push({fecha:toIsoDate(fechaRaw,todayValue()),legajo:emp.legajo,nombre:emp.nombre,sector:sectorRaw||emp.sector,produccionReal:cantidad,calidad:emp.tipoEmpleado==='Operario'?'Sin errores':'No aplica',observaciones:observaciones||'Importado desde PRODUCCIONXDIA'});
      }
    });
    return {rows,errs};
  }

  function parseGenericRows(data){
    const rows=[];const errs=[];let lastDate=todayValue();
    (data||[]).forEach((raw,idx)=>{
      const obj={};Object.entries(raw||{}).forEach(([k,v])=>{const nk=normKey(k);obj[nk]=nk==='fecha'?v:normText(v);});
      if(Object.values(obj).every(v=>!v))return;
      const fecha=obj.fecha?toIsoDate(obj.fecha,lastDate):lastDate;
      if(obj.fecha)lastDate=fecha;
      const nombreRaw=obj.nombre||obj.empleado||obj.apellidoynombre||'';
      const emp=findEmployeeMatch(employees,obj.legajo||obj.codigo||obj.id||'',nombreRaw);
      if(!emp){errs.push(`Fila ${idx+2}: empleado no encontrado`);return;}
      const cantidad=Number(String(obj.cantidadproducida||obj.produccionreal||obj.produccion||obj.cantidad||'0').replace(',','.'));
      if(!Number.isFinite(cantidad)){errs.push(`Fila ${idx+2}: cantidad inválida`);return;}
      rows.push({fecha,legajo:emp.legajo,nombre:emp.nombre,sector:obj.sector||emp.sector,produccionReal:cantidad,calidad:QUAL.find(q=>normKey(q)===normKey(obj.calidad||''))||(emp.tipoEmpleado==='Operario'?'Sin errores':'No aplica'),observaciones:obj.observaciones||''});
    });
    return {rows,errs};
  }

  function handleFile(file){
    if(!file){setErrors(['No seleccionaste archivo.']);return;}
    const ext=(file.name||'').split('.').pop().toLowerCase();
    if(['xlsx','xls','xlsm'].includes(ext)){
      const reader=new FileReader();
      reader.onload=e=>{
        try{
          const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
          const parsed=parseProduccionXDiaWorkbook(wb);
          if(parsed.rows.length>0){setPreview(parsed.rows);setErrors(parsed.errs);setStep('preview');return;}
          const sh=wb.Sheets[wb.SheetNames[0]];
          const data=XLSX.utils.sheet_to_json(sh,{defval:'',raw:false});
          const generic=parseGenericRows(data);
          setPreview(generic.rows);setErrors(generic.errs);
          if(generic.rows.length>0)setStep('preview'); else setErrors(generic.errs.length?generic.errs:['No se encontraron filas válidas.']);
        }catch(err){setErrors(['No se pudo leer el Excel.']);}
      };
      reader.readAsArrayBuffer(file);
    }else{
      parseFlexibleFile(file,data=>{
        const generic=parseGenericRows(data);
        setPreview(generic.rows);setErrors(generic.errs);
        if(generic.rows.length>0)setStep('preview'); else setErrors(generic.errs.length?generic.errs:['No se encontraron filas válidas.']);
      },setErrors);
    }
  }

  return <BaseModal title='📊 Importar carga diaria' subtitle='Entiende el archivo PRODUCCIONXDIA: Fecha, Empleado, Sector y Cantidad producida' onClose={onClose} color='emerald'>
    {step==='upload'&&<div>
      <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0]);}} onClick={()=>fileRef.current.click()} style={{border:`2.5px dashed ${drag?C.emerald:C.s300}`,borderRadius:'14px',padding:'36px',textAlign:'center',cursor:'pointer',background:drag?C.emeraldL:C.s50,marginBottom:'16px'}}>
        <div style={{fontSize:'40px',marginBottom:'10px'}}>📊</div>
        <div style={{fontSize:'14px',fontWeight:700,color:C.s700}}>Arrastrá el archivo PRODUCCIONXDIA o hacé click</div>
        <div style={{fontSize:'12px',color:C.s500,marginTop:'4px'}}>Reconoce la tabla con columnas Fecha / Empleado / Sector / Cantidad producida</div>
        <input ref={fileRef} type='file' accept='.csv,.xlsx,.xls' style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
      </div>
      {errors.length>0&&<div style={{padding:'12px',background:C.roseL,borderRadius:'10px'}}>{errors.map((e,i)=><div key={i} style={{fontSize:'12px',color:C.roseD}}>• {e}</div>)}</div>}
    </div>}
    {step==='preview'&&<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}><div style={{fontWeight:700,color:C.s800}}>{preview.length} filas para importar</div><BtnS onClick={()=>{setStep('upload');setPreview([]);setErrors([]);}}>← Cambiar</BtnS></div>
      {errors.length>0&&<div style={{marginBottom:'12px',padding:'12px',background:C.amberL,borderRadius:'10px'}}>{errors.map((e,i)=><div key={i} style={{fontSize:'11px',color:C.amberD}}>• {e}</div>)}</div>}
      <div style={{maxHeight:'320px',overflow:'auto',borderRadius:'10px',border:`1px solid ${C.s200}`,marginBottom:'16px'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}><thead style={{position:'sticky',top:0,background:`linear-gradient(90deg,${C.emeraldL},${C.indigoL})`}}><tr>{['Fecha','Legajo','Nombre','Sector','Cantidad','Calidad'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',fontWeight:700,color:C.emeraldD}}>{h}</th>)}</tr></thead><tbody>{preview.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.s100}`,background:i%2===0?C.white:C.s50}}><td style={{padding:'7px 10px'}}>{fmtDate(r.fecha)}</td><td style={{padding:'7px 10px',fontFamily:'monospace'}}>{r.legajo}</td><td style={{padding:'7px 10px',fontWeight:600}}>{r.nombre}</td><td style={{padding:'7px 10px'}}>{r.sector}</td><td style={{padding:'7px 10px',fontWeight:700,color:C.emeraldD}}>{r.produccionReal}</td><td style={{padding:'7px 10px'}}>{r.calidad}</td></tr>)}</tbody></table>
      </div>
      <div style={{display:'flex',gap:'10px'}}><BtnP onClick={()=>{onImport(preview);setStep('done');}}>✅ Importar {preview.length}</BtnP><BtnN onClick={onClose}>Cancelar</BtnN></div>
    </div>}
    {step==='done'&&<div style={{textAlign:'center',padding:'24px 0'}}><div style={{fontSize:'48px',marginBottom:'12px'}}>✅</div><div style={{fontSize:'16px',fontWeight:800,color:C.emeraldD,marginBottom:'8px'}}>Carga importada</div><BtnP onClick={onClose}>Cerrar</BtnP></div>}
  </BaseModal>;
}

    const legajo=(empForm.legajo||'').trim()||`AUTO-${Math.random().toString(36).slice(2,6)}`;
    const nombre=(empForm.nombre||'').trim()||`Empleado ${legajo}`;

    const metaDiaria=Number(empForm.metaDiaria||0);
    if(employees.some(e=>e.legajo===legajo&&e.id!==empForm.id)){alert('Ya existe un empleado con ese legajo.');return;}
    if(!empForm.id){
      const next={id:makeId('emp'),legajo,nombre,sector,turno:empForm.turno,tipoEmpleado:empForm.tipoEmpleado,supervisor,metaDiaria,activo:true};
      setEmployees(p=>[next,...p]);

      setEmpForm(emptyEmp);return;
    }
    const prev=employees.find(e=>e.id===empForm.id);if(!prev)return;
    const upd={...prev,legajo,nombre,sector,turno:empForm.turno,tipoEmpleado:empForm.tipoEmpleado,supervisor,metaDiaria,activo:empForm.activo};
    setEmployees(p=>p.map(e=>e.id===upd.id?upd:e));

    setEmpForm(emptyEmp);

  function importFullWorkbookFile(file){
    if(!file)return;
    if(!confirm('Esto va a reemplazar la información actual con la del Excel completo. ¿Continuar?')){if(fullReportInputRef.current)fullReportInputRef.current.value='';return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
        const activeRows=sheetObjectsByAliases(wb,['Empleados activos','Empleados activo']);
        const inactiveRows=sheetObjectsByAliases(wb,['Empleados baja','Empleados dados de baja','Empleados bajas']);
        const movementRows=sheetObjectsByAliases(wb,['Movimientos personal','Movimiento personal']);
        const baseRows=sheetObjectsByAliases(wb,['Base general']);
        const saltRows=sheetObjectsByAliases(wb,['Sal movimientos','Movimientos de sal']);
        const plantRows=sheetObjectsByAliases(wb,['Plantas sal','Plantas de sal']);

        let importedEmployees=[
          ...activeRows.map(r=>parseWorkbookEmployeeRow(r,true)).filter(Boolean),
          ...inactiveRows.map(r=>parseWorkbookEmployeeRow(r,false)).filter(Boolean)
        ];
        const empByLegajo=new Map();
        importedEmployees.forEach(emp=>{if(!empByLegajo.has(String(emp.legajo)))empByLegajo.set(String(emp.legajo),emp); else if(emp.activo)empByLegajo.set(String(emp.legajo),emp);});
        importedEmployees=sortByName(Array.from(empByLegajo.values()));

        const importedMovements=movementRows.map(parseWorkbookMovementRow).filter(Boolean).sort((a,b)=>compareDateDesc(a.fecha,b.fecha)||String(a.nombre||'').localeCompare(String(b.nombre||'')));
        const importedRecords=baseRows.map(r=>parseWorkbookRecordRow(r,importedEmployees)).filter(Boolean).sort((a,b)=>compareDateDesc(a.fecha,b.fecha)||String(a.nombre||'').localeCompare(String(b.nombre||'')));
        const importedSalt=saltRows.map(parseWorkbookSaltRow).filter(Boolean).sort((a,b)=>compareDateDesc(a.fecha,b.fecha)||String(a.tipo||'').localeCompare(String(b.tipo||'')));
        const importedPlantsRaw=plantRows.map(parseWorkbookPlantRow).filter(Boolean);
        const importedPlants=(importedPlantsRaw.length?importedPlantsRaw:defaultSaltPlants()).sort((a,b)=>String(a.nombre||'').localeCompare(String(b.nombre||'')));

        if(!importedEmployees.length && !importedRecords.length && !importedSalt.length){
          alert('No se encontraron hojas válidas para importar en el Excel completo.');
          if(fullReportInputRef.current)fullReportInputRef.current.value='';
          return;
        }

        setEmployees(importedEmployees);
        setMovements(importedMovements);
        setRecords(importedRecords);
        setSaltMoves(importedSalt);
        setSaltPlants(importedPlants);

        const activeImported=sortByName(importedEmployees.filter(e=>e.activo));
        const firstLegajo=activeImported[0]?.legajo||'';
        const latestDate=unique([...importedRecords.map(r=>r.fecha),...importedSalt.map(m=>m.fecha)]).sort(compareDateAsc).slice(-1)[0]||todayValue();
        const allDates=unique([...importedRecords.map(r=>r.fecha),...importedSalt.map(m=>m.fecha)]).sort(compareDateAsc);
        const hasta=allDates[allDates.length-1]||'';
        const desde=allDates[Math.max(0,allDates.length-7)]||hasta;

        setPresentForm({fecha:latestDate,legajo:firstLegajo,estadoDia:'Presente',entrada:'',salida:'',observaciones:''});
        setDailyForm({fecha:latestDate,legajo:firstLegajo,produccionReal:'',calidad:(activeImported[0]?.tipoEmpleado==='Operario'?'Sin errores':'No aplica'),observaciones:''});
        setPresentListFilters({fecha:latestDate,legajo:'Todos'});
        setDailyListFilters({fecha:latestDate,legajo:'Todos'});
        setDashboardRange({desde,hasta});
        setFilters({fecha:latestDate,sector:'Todos',turno:'Todos',supervisor:'Todos'});
        setWeekFilter('Todas');
        setSaltFilters({fechaDesde:'',fechaHasta:'',tipo:'Todos',texto:'',planta:'Todas'});
        setSaltForm({id:'',fecha:latestDate,tipo:'Ingreso compra',base:'pallets',cantidad:String(SAL_DEFAULT_PURCHASE_PALLETS),frigorifico:'',sector:'',observaciones:''});
        setFichaLeg(firstLegajo);
        setCompareLegs([]);
        setCompareSelect(activeImported.find(e=>e.legajo!==firstLegajo)?.legajo||'');
        setTab('DASHBOARD_HOY');

        alert(`Informe completo importado.\nEmpleados: ${importedEmployees.length}\nRegistros: ${importedRecords.length}\nMovimientos de sal: ${importedSalt.length}`);
      }catch(err){
        console.error(err);
        alert('No se pudo leer el Excel completo.');
      }finally{
        if(fullReportInputRef.current)fullReportInputRef.current.value='';
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function clearAll(){if(!confirm('Esto vacía personal, historial, sal y registros. ¿Continuar?'))return;localStorage.removeItem(SK.e);localStorage.removeItem(SK.m);localStorage.removeItem(SK.r);localStorage.removeItem(SK.s);localStorage.removeItem(SK.sp);setEmployees([]);setMovements([]);setRecords([]);setSaltMoves([]);setSaltPlants(defaultSaltPlants());setNewSaltPlant('');setEmpForm(emptyEmp);setPresentForm({fecha:todayValue(),legajo:'',estadoDia:'Presente',entrada:'',salida:'',observaciones:''});setDailyForm({fecha:todayValue(),legajo:'',produccionReal:'',calidad:'Sin errores',observaciones:''});setSaltForm({id:'',fecha:todayValue(),tipo:'Ingreso compra',base:'pallets',cantidad:String(SAL_DEFAULT_PURCHASE_PALLETS),frigorifico:'',sector:'',observaciones:''});setSaltFilters({fechaDesde:'',fechaHasta:'',tipo:'Todos',texto:'',planta:'Todas'});setFichaLeg('');setCompareLegs([]);setCompareSelect('');}
  function addComparator(){if(!compareSelect||compareSelect===fichaLeg||compareLegs.includes(compareSelect))return;setCompareLegs(p=>[...p,compareSelect].slice(0,3));}
  function saveSaltMovement(){
    if((Number(String(saltForm.cantidad||0).replace(',','.'))||0)<=0){alert('Ingresá una cantidad válida de sal.');return;}
    if(saltForm.tipo==='Salida frigorifico'&&!String(saltForm.frigorifico||'').trim()){alert('Seleccioná una planta para la salida.');return;}
    const move=buildSaltMove(saltForm);
    setSaltMoves(prev=>{
      const exists=prev.some(m=>m.id===move.id);
      const next=exists?prev.map(m=>m.id===move.id?move:m):[move,...prev];
      return next.sort((a,b)=>compareDateDesc(a.fecha,b.fecha));
    });
    setSaltForm({id:'',fecha:todayValue(),tipo:'Ingreso compra',base:'pallets',cantidad:String(SAL_DEFAULT_PURCHASE_PALLETS),frigorifico:'',sector:'',observaciones:''});
  }

  function deleteSaltMovement(id){if(!confirm('¿Eliminar este movimiento de sal?'))return;setSaltMoves(p=>p.filter(m=>m.id!==id)); if(saltForm.id===id)cancelSaltEdit();}
  function addSaltPlant(){
    const nombre=(newSaltPlant||'').trim();
    if(!nombre){alert('Escribí el nombre de la planta.');return;}
    const exists=(saltPlants||[]).find(p=>normKey(p.nombre)===normKey(nombre));
    if(exists){
      if(exists.activa){alert('Esa planta ya está activa.');return;}
      setSaltPlants(prev=>prev.map(p=>p.id===exists.id?{...p,nombre,activa:true}:p));
      setNewSaltPlant('');
      return;
    }
    setSaltPlants(prev=>[...prev,{id:makeId('planta'),nombre,activa:true}]);
    setNewSaltPlant('');
  }
  function setSaltPlantStatus(id,activa){
    setSaltPlants(prev=>prev.map(p=>p.id===id?{...p,activa}:p));
    const plant=saltPlants.find(p=>p.id===id);
    if(!activa&&plant&&saltForm.frigorifico===plant.nombre)setSaltForm(f=>({...f,frigorifico:''}));
    if(!activa&&plant&&saltFilters.planta===plant.nombre)setSaltFilters(f=>({...f,planta:'Todas'}));
  }

  function exportFullWorkbook(){
    if(typeof XLSX==='undefined'){alert('No se pudo generar el archivo completo.');return;}
    const wb=XLSX.utils.book_new();
    const now=new Date();
    const allDates=unique([...records.map(r=>r.fecha),...saltMoves.map(m=>m.fecha)]).sort(compareDateAsc);
    const orderedRecords=[...records].sort((a,b)=>compareDateAsc(a.fecha,b.fecha)||String(a.nombre).localeCompare(String(b.nombre)));
    const orderedSalt=[...saltMoves].sort((a,b)=>compareDateAsc(a.fecha,b.fecha)||String(a.tipo).localeCompare(String(b.tipo)));
    const orderedMovements=[...movements].sort((a,b)=>compareDateAsc(a.fecha,b.fecha)||String(a.nombre).localeCompare(String(b.nombre)));
    const orderedPlants=[...(saltPlants||[])].sort((a,b)=>String(a.nombre||'').localeCompare(String(b.nombre||'')));
    const totalStockKg=round2(saltMoves.reduce((a,m)=>a+signedSalt(m,'kg'),0));

    appendJsonSheet(wb,'Resumen general',[
      {Seccion:'Generado',Detalle:now.toLocaleString('es-AR')},
      {Seccion:'Rango con datos',Detalle:allDates.length?`${fmtDate(allDates[0])} a ${fmtDate(allDates[allDates.length-1])}`:'Sin fechas'},
      {Seccion:'Empleados activos',Detalle:activeEmployees.length},
      {Seccion:'Empleados dados de baja',Detalle:inactiveEmployees.length},
      {Seccion:'Registros base general',Detalle:records.length},
      {Seccion:'Movimientos de personal',Detalle:movements.length},
      {Seccion:'Movimientos de sal',Detalle:saltMoves.length},
      {Seccion:'Stock actual de sal (kg)',Detalle:totalStockKg},
      {Seccion:'Stock actual de sal (bolsas)',Detalle:round2(totalStockKg/SAL_BAG_KG)},
      {Seccion:'Stock actual de sal (pallets)',Detalle:round2(totalStockKg/(SAL_BAG_KG*SAL_PALLET_BAGS))}
    ]);

    appendJsonSheet(wb,'Resumen por fecha',allDates.map(fecha=>{
      const dayRecords=records.filter(r=>r.fecha===fecha);
      const daySalt=saltMoves.filter(m=>m.fecha===fecha);
      const presentes=dayRecords.filter(r=>['Presente','Tarde','Media jornada'].includes(r.estadoDia)).length;
      const ausentes=dayRecords.filter(r=>r.estadoDia==='Ausente').length;
      const produccion=round2(dayRecords.reduce((a,r)=>a+Number(r.produccionReal||0),0));
      const consumo=round2(daySalt.filter(m=>m.tipo==='Consumo planta').reduce((a,m)=>a+Number(m.kg||0),0));
      const salida=round2(daySalt.filter(m=>m.tipo==='Salida frigorifico').reduce((a,m)=>a+Number(m.kg||0),0));
      const ingreso=round2(daySalt.filter(m=>m.tipo==='Ingreso compra'||m.tipo==='Ajuste +').reduce((a,m)=>a+Number(m.kg||0),0));
      const plantasDia=unique(daySalt.map(m=>m.frigorifico).filter(Boolean)).join(', ');
      return {
        Fecha:fmtDate(fecha),
        Semana:getWeekNum(fecha),
        'Empleados con registro':dayRecords.length,
        Presentes:presentes,
        Ausentes:ausentes,
        'Producción total':produccion,
        'Sal consumida planta (kg)':consumo,
        'Sal salida frigoríficos (kg)':salida,
        'Sal ingresada (kg)':ingreso,
        Plantas:plantasDia||'—'
      };
    }));

    appendJsonSheet(wb,'Empleados activos',activeEmployees.map(e=>({
      Legajo:e.legajo,
      Nombre:e.nombre,
      Sector:e.sector,
      Turno:e.turno,
      Tipo:e.tipoEmpleado,
      Supervisor:e.supervisor||'Sin supervisor',
      'Meta diaria':e.metaDiaria,
      Estado:'Activo'
    })));
    appendJsonSheet(wb,'Empleados baja',inactiveEmployees.map(e=>({
      Legajo:e.legajo,
      Nombre:e.nombre,
      Sector:e.sector,
      Turno:e.turno,
      Tipo:e.tipoEmpleado,
      Supervisor:e.supervisor||'Sin supervisor',
      'Meta diaria':e.metaDiaria,
      Estado:'Baja'
    })));
    appendJsonSheet(wb,'Movimientos personal',orderedMovements.map(m=>({
      Fecha:fmtDate(m.fecha),
      Legajo:m.legajo,
      Nombre:m.nombre,
      Cambio:m.cambio,
      Antes:m.valorAnterior,
      Despues:m.valorNuevo,
      Autoriza:m.autoriza,
      Activo:m.activo,
      Observacion:m.observacion
    })));
    appendJsonSheet(wb,'Plantas sal',orderedPlants.map(p=>({
      Planta:p.nombre,
      Estado:p.activa?'Activa':'Inactiva'
    })));
    appendJsonSheet(wb,'Base general',orderedRecords.map(r=>({
      Fecha:fmtDate(r.fecha),
      Semana:r.semana,
      Legajo:r.legajo,
      Nombre:r.nombre,
      Sector:r.sector,
      Turno:r.turno,
      Tipo:r.tipoEmpleado,
      Estado:r.estadoDia,
      Entrada:r.entrada||'—',
      Salida:r.salida||'—',
      Horas:r.horas,
      Produccion:r.produccionReal,
      Meta:r.metaDiaria,
      'Cumplimiento %':`${r.cumplimiento}%`,
      Calidad:r.calidad,
      Puntaje:r.puntajeFinal??'—',
      Semaforo:r.semaforo,
      Observaciones:r.observaciones||''
    })));
    appendJsonSheet(wb,'Sal movimientos',orderedSalt.map(m=>({
      Fecha:fmtDate(m.fecha),
      Tipo:m.tipo,
      Base:m.base,
      Cantidad:m.cantidad,
      Kg:m.kg,
      Bolsas:m.bolsas,
      Pallets:m.pallets,
      Signo:m.signo>0?'+':'-',
      Planta:m.frigorifico||'—',
      Sector:m.sector||'—',
      Observaciones:m.observaciones||''
    })));

    allDates.forEach(fecha=>{
      const dayRecords=orderedRecords.filter(r=>r.fecha===fecha);
      const daySalt=orderedSalt.filter(m=>m.fecha===fecha);
      const presentes=dayRecords.filter(r=>['Presente','Tarde','Media jornada'].includes(r.estadoDia)).length;
      const ausentes=dayRecords.filter(r=>r.estadoDia==='Ausente').length;
      const produccion=round2(dayRecords.reduce((a,r)=>a+Number(r.produccionReal||0),0));
      const consumo=round2(daySalt.filter(m=>m.tipo==='Consumo planta').reduce((a,m)=>a+Number(m.kg||0),0));
      const salida=round2(daySalt.filter(m=>m.tipo==='Salida frigorifico').reduce((a,m)=>a+Number(m.kg||0),0));
      const ingreso=round2(daySalt.filter(m=>m.tipo==='Ingreso compra'||m.tipo==='Ajuste +').reduce((a,m)=>a+Number(m.kg||0),0));
      const aoa=[
        ['Reporte integral del día',fmtDate(fecha)],
        [],
        ['Resumen'],
        ['Empleados con registro',dayRecords.length],
        ['Presentes',presentes],
        ['Ausentes',ausentes],
        ['Producción total',produccion],
        ['Sal consumida planta (kg)',consumo],
        ['Sal salida frigoríficos (kg)',salida],
        ['Sal ingresada (kg)',ingreso],
        []
      ];
      aoa.push(['Empleados y producción']);
      aoa.push(['Legajo','Nombre','Sector','Turno','Tipo','Estado','Entrada','Salida','Horas','Producción','Meta','Cumpl. %','Calidad','Semáforo','Observaciones']);
      if(dayRecords.length){
        dayRecords.forEach(r=>aoa.push([r.legajo,r.nombre,r.sector,r.turno,r.tipoEmpleado,r.estadoDia,r.entrada||'—',r.salida||'—',r.horas,r.produccionReal,r.metaDiaria,`${r.cumplimiento}%`,r.calidad,r.semaforo,r.observaciones||'']));
      } else {
        aoa.push(['Sin registros de empleados']);
      }
      aoa.push([]);
      aoa.push(['Sal del día']);
      aoa.push(['Tipo','Base','Cantidad','Kg','Bolsas','Pallets','Planta','Sector','Observaciones']);
      if(daySalt.length){
        daySalt.forEach(m=>aoa.push([m.tipo,m.base,m.cantidad,m.kg,m.bolsas,m.pallets,m.frigorifico||'—',m.sector||'—',m.observaciones||'']));
      } else {
        aoa.push(['Sin movimientos de sal']);
      }
      appendAoaSheet(wb,`Día ${fmtDate(fecha).replace(/\//g,'-')}`,aoa);
    });

    XLSX.writeFile(wb,`reporte_completo_planta_${formatDateISO(now)}.xlsx`);
  }

      <div style={{display:'flex',gap:'2px',padding:isMobile?'10px 12px 0':'10px 20px 0',overflowX:'auto'}}>{TABS.map(t=><button key={t.id} className='tab-btn' onClick={()=>setTab(t.id)} style={{padding:'9px 16px',fontSize:'13px',fontWeight:tab===t.id?700:500,color:tab===t.id?C.white:'rgba(255,255,255,.5)',background:tab===t.id?'rgba(255,255,255,.15)':'transparent',border:'none',borderRadius:'9px 9px 0 0',cursor:'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:'6px',borderBottom:tab===t.id?'3px solid #818cf8':'3px solid transparent'}}><span style={{fontSize:'14px'}}>{t.icon}</span>{t.label}</button>)}</div>

    <div style={{padding:isMobile?'12px':'24px',maxWidth:'1500px',margin:'0 auto'}}>
      {tab==='DASHBOARD_HOY'&&<div>
        <SecH title='Dashboard' subtitle='Elegí un rango de fechas para ver promedios, gráficos ampliados y el detalle separado por día.' right={<>
          <DateInp value={dashboardRange.desde} onChange={e=>setDashboardRange(p=>({...p,desde:e.target.value}))} style={{width:'160px'}}/>
          <DateInp value={dashboardRange.hasta} onChange={e=>setDashboardRange(p=>({...p,hasta:e.target.value}))} style={{width:'160px'}}/>
          <BtnN onClick={()=>{if(dashboardDateOptions.length){const hasta=dashboardDateOptions[dashboardDateOptions.length-1];const desde=dashboardDateOptions[Math.max(0,dashboardDateOptions.length-7)]||hasta;setDashboardRange({desde,hasta});}}}>Últimos 7 días</BtnN>
          <BtnN onClick={()=>{if(dashboardDateOptions.length)setDashboardRange({desde:dashboardDateOptions[0],hasta:dashboardDateOptions[dashboardDateOptions.length-1]});}}>Todo</BtnN>
          <Sel value={filters.sector} onChange={e=>setFilters(p=>({...p,sector:e.target.value}))} style={{width:'150px'}}><option value='Todos'>Todos sectores</option>{sectors.map(s=><option key={s} value={s}>{s}</option>)}</Sel>
          <Sel value={filters.turno} onChange={e=>setFilters(p=>({...p,turno:e.target.value}))} style={{width:'140px'}}><option value='Todos'>Todos turnos</option>{turnos_.map(t=><option key={t} value={t}>{t}</option>)}</Sel>
          <Sel value={filters.supervisor} onChange={e=>setFilters(p=>({...p,supervisor:e.target.value}))} style={{width:'170px'}}><option value='Todos'>Todos supervisores</option>{supervisors.map(s=><option key={s} value={s}>{s}</option>)}</Sel>
        </>} />
        {!employees.length?<Card style={{textAlign:'center',padding:'40px'}}><div style={{fontSize:'56px',marginBottom:'12px'}}>🏁</div><div style={{fontSize:'20px',fontWeight:800,color:C.s800,marginBottom:'8px'}}>Sin empleados cargados</div><div style={{color:C.s500,marginBottom:'16px'}}>Primero cargá personal desde la solapa <b>Personal</b> o importá tu archivo.</div><div style={{display:'flex',justifyContent:'center',gap:'8px',flexWrap:'wrap'}}><BtnP onClick={()=>setTab('ADMIN_PERSONAL')}>Ir a Personal</BtnP><BtnN onClick={()=>setShowEmpImport(true)}>Importar empleados</BtnN></div></Card>:<>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:'10px',marginBottom:'18px'}}>
          <KPI label='Registros filtrados' value={dashboardKpis.total} icon='📦' bg={C.indigoL} color={C.indigoD}/>
          <KPI label='Presentes' value={dashboardKpis.presentes} icon='✅' bg={C.emeraldL} color={C.emeraldD}/>
          <KPI label='Ausentes' value={dashboardKpis.ausentes} icon='❌' bg={C.roseL} color={C.roseD}/>
          <KPI label='Operativos' value={dashboardKpis.operativos} icon='⚙️' bg={C.skyL} color={C.skyD}/>
          <KPI label='Rend. prom.' value={dashboardKpis.rend} icon='📈'/>
          <KPI label='Verde' value={dashboardKpis.verdes} bg={C.emeraldL} color={C.emeraldD}/>
          <KPI label='Amarillo' value={dashboardKpis.amarillos} bg={C.amberL} color={C.amberD}/>
          <KPI label='Rojo' value={dashboardKpis.rojos} bg={C.roseL} color={C.roseD}/>
        </div>

        <Card style={{marginBottom:'18px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'12px',flexWrap:'wrap',marginBottom:'14px'}}>
            <div>
              <div style={{fontSize:'16px',fontWeight:800,color:C.indigoD}}>📌 Promedios del período</div>
              <div style={{fontSize:'12px',color:C.s500,marginTop:'3px'}}>
                {dashboardRange.desde&&dashboardRange.hasta?`${dashboardRange.desde} → ${dashboardRange.hasta}`:'Todos los días disponibles'}
              </div>
            </div>
            <BtnP onClick={()=>setDashboardExpanded(v=>!v)}>{dashboardExpanded?'Ocultar detalle':'Ver detalle del promedio'}</BtnP>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:'10px'}}>
            <KPI label='Prom. asistencia' value={`${dashboardPeriodAverages.asistencia}%`} bg={C.emeraldL} color={C.emeraldD}/>
            <KPI label='Prom. horas' value={dashboardPeriodAverages.horas} bg={C.skyL} color={C.skyD}/>
            <KPI label='Prom. producción' value={dashboardPeriodAverages.produccion} bg={C.violetL} color={C.violetD}/>
            <KPI label='Prom. cumplimiento' value={`${dashboardPeriodAverages.cumplimiento}%`} bg={C.indigoL} color={C.indigoD}/>
            <KPI label='Sal prom./día' value={`${dashboardSaltStats.avgKg} kg`} bg={C.orangeL} color={C.orangeD} sub={`${dashboardSaltStats.avgBolsas} bolsas · ${dashboardSaltStats.avgPallets} pallets`}/>
            <KPI label='Días en rango' value={dashboardPeriodAverages.dias} bg={C.s50} color={C.s800}/>
          </div>
          {dashboardExpanded&&<div style={{display:'grid',gridTemplateColumns:gridCols('minmax(0,1fr) minmax(0,1fr)'),gap:'14px',marginTop:'16px'}}>
            <Card style={{padding:'1rem',boxShadow:'none',border:`1px solid ${C.s200}`}}>
              <CardTitle>📈 Promedios por día</CardTitle>
              {dashboardCharts.labels.length?<LineChart labels={dashboardCharts.labels} datasets={[
                {label:'% Cumpl. prom.',data:dashboardCharts.perf,borderColor:C.indigo,backgroundColor:'rgba(99,102,241,.08)',fill:true,pointBackgroundColor:C.indigo,pointBorderColor:C.white},
                {label:'% Asistencia prom.',data:dashboardCharts.assist,borderColor:C.emerald,backgroundColor:'transparent',pointBackgroundColor:C.emerald,pointBorderColor:C.white}
              ]} height={240} yMax={130}/>:<div style={{height:240,display:'flex',alignItems:'center',justifyContent:'center',color:C.s400}}>Sin datos</div>}
            </Card>
            <Card style={{padding:'1rem',boxShadow:'none',border:`1px solid ${C.s200}`}}>
              <CardTitle>📦 Producción y horas promedio</CardTitle>
              {dashboardCharts.labels.length?<BarChart labels={dashboardCharts.labels} datasets={[
                {label:'Producción prom.',data:dashboardCharts.prod,backgroundColor:C.violet,borderRadius:5},
                {label:'Horas prom.',data:dashboardCharts.hours,backgroundColor:C.sky,borderRadius:5}
              ]} height={240}/>:<div style={{height:240,display:'flex',alignItems:'center',justifyContent:'center',color:C.s400}}>Sin datos</div>}
            </Card>
            <Card style={{padding:'1rem',boxShadow:'none',border:`1px solid ${C.s200}`}}>
              <CardTitle>🧂 Consumo de sal por día</CardTitle>
              {dashboardSaltStats.labels.length?<LineChart labels={dashboardSaltStats.labels} datasets={[
                {label:'Consumo de sal (kg)',data:dashboardSaltStats.data,borderColor:C.orange,backgroundColor:'rgba(249,115,22,.10)',fill:true,pointBackgroundColor:C.orange,pointBorderColor:C.white,tension:0.3}
              ]} height={240}/>:<div style={{height:240,display:'flex',alignItems:'center',justifyContent:'center',color:C.s400}}>Sin consumo de sal en el rango</div>}
            </Card>
          </div>}
        </Card>

        <div style={{display:'grid',gridTemplateColumns:gridCols('minmax(0,1.5fr) minmax(300px,0.95fr)'),gap:'14px',marginBottom:'18px',alignItems:'start'}}>
          <Card>
            <CardTitle>📅 Resumen histórico del rango</CardTitle>
            {dashboardCharts.labels.length?<BarChart labels={dashboardCharts.labels} datasets={[
              {label:'Presentes',data:dashboardCharts.attendance.map(x=>x.presentes),backgroundColor:C.emerald,borderRadius:4},
              {label:'Tardes',data:dashboardCharts.attendance.map(x=>x.tardes),backgroundColor:C.amber,borderRadius:4},
              {label:'Ausentes',data:dashboardCharts.attendance.map(x=>x.ausentes),backgroundColor:C.rose,borderRadius:4}
            ]} height={200} stacked={true}/>:<div style={{height:200,display:'flex',alignItems:'center',justifyContent:'center',color:C.s400}}>Sin datos</div>}
          </Card>
          <div style={{display:'grid',gap:'14px'}}>
            <Card>
              <CardTitle>🚦 Semáforo</CardTitle>
              {dashboardKpis.verdes+dashboardKpis.amarillos+dashboardKpis.rojos>0?<DonutChart labels={['Verde','Amarillo','Rojo']} data={[dashboardKpis.verdes,dashboardKpis.amarillos,dashboardKpis.rojos]} colors={[C.emerald,C.amber,C.rose]} height={180}/>:<div style={{height:180,display:'flex',alignItems:'center',justifyContent:'center',color:C.s400}}>Sin datos</div>}
            </Card>
            <Card>
              <CardTitle>🚨 Alertas rápidas</CardTitle>
              <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>{alerts.length?alerts.map((al,i)=><div key={i} style={{padding:'10px 12px',borderRadius:'10px',background:al.t==='danger'?C.roseL:C.amberL,color:al.t==='danger'?C.roseD:C.amberD,fontSize:'12px',fontWeight:700,borderLeft:`4px solid ${al.t==='danger'?C.rose:C.amber}`}}>{al.txt}</div>):<div style={{padding:'12px',borderRadius:'10px',background:C.emeraldL,color:C.emeraldD,fontWeight:700}}>Sin alertas activas</div>}</div>
            </Card>
          </div>
        </div>

        <Card style={{marginBottom:'18px',padding:'1rem 1.1rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
            <div>
              <div style={{fontSize:'15px',fontWeight:800,color:C.indigoD}}>Detalle por dia</div>
              <div style={{fontSize:'12px',color:C.s500,marginTop:'3px'}}>Cada dia queda en una tarjeta compacta. Hace click para expandir solo el dia que quieras revisar.</div>
            </div>
            <div style={{fontSize:'12px',color:C.s500}}>Colores alternados por dia para ubicar mas rapido la informacion</div>
          </div>
        </Card>

        <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          {dashboardDailySummary.length===0?<Card style={{textAlign:'center',padding:'30px',color:C.s500}}>No hay información para ese rango de fechas.</Card>:dashboardDailySummary.slice().sort((a,b)=>compareDateDesc(a.fecha,b.fecha)).map((day,idx)=>{
            const dayColor=daySectionColor(idx);
            return <details key={day.fecha} open={idx===0} style={{background:C.white,borderRadius:'16px',border:`1px solid ${C.s200}`,boxShadow:'0 1px 4px rgba(0,0,0,.06)',overflow:'hidden'}}>
              <summary style={{listStyle:'none',cursor:'pointer',padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'12px',flexWrap:'wrap',borderTop:`6px solid ${dayColor}`,background:`linear-gradient(90deg,${dayColor}22,${C.white})`}}>
                <div>
                  <div style={{fontSize:'16px',fontWeight:800,color:C.s800}}>{dayTitle(day.fecha)}</div>
                  <div style={{fontSize:'12px',color:C.s500,marginTop:'3px'}}>{day.total} registros · {day.presentes} presentes · {day.ausentes} ausentes</div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:gridCols('repeat(4,minmax(95px,1fr))','repeat(2,minmax(95px,1fr))'),gap:'8px',minWidth:isMobile?'100%':'390px',maxWidth:'100%'}}>
                  <div style={{padding:'8px 10px',background:'rgba(255,255,255,.72)',borderRadius:'10px'}}><div style={{fontSize:'10px',fontWeight:700,color:C.s500,textTransform:'uppercase'}}>Asistencia</div><div style={{fontSize:'18px',fontWeight:800,color:day.avgAsistencia>=90?C.emeraldD:day.avgAsistencia>=75?C.amberD:C.roseD}}>{day.avgAsistencia}%</div></div>
                  <div style={{padding:'8px 10px',background:'rgba(255,255,255,.72)',borderRadius:'10px'}}><div style={{fontSize:'10px',fontWeight:700,color:C.s500,textTransform:'uppercase'}}>Horas prom.</div><div style={{fontSize:'18px',fontWeight:800,color:C.skyD}}>{day.avgHoras}</div></div>
                  <div style={{padding:'8px 10px',background:'rgba(255,255,255,.72)',borderRadius:'10px'}}><div style={{fontSize:'10px',fontWeight:700,color:C.s500,textTransform:'uppercase'}}>Prod. prom.</div><div style={{fontSize:'18px',fontWeight:800,color:C.violetD}}>{day.avgProd}</div></div>
                  <div style={{padding:'8px 10px',background:'rgba(255,255,255,.72)',borderRadius:'10px'}}><div style={{fontSize:'10px',fontWeight:700,color:C.s500,textTransform:'uppercase'}}>Cumpl. prom.</div><div style={{fontSize:'18px',fontWeight:800,color:C.indigoD}}>{day.avgCumpl}%</div></div>
                </div>
              </summary>
              <div style={{padding:'0 16px 16px'}}>
                <div style={{fontSize:'12px',color:C.s500,margin:'2px 0 12px'}}>Detalle completo del personal para {dayTitle(day.fecha)}.</div>
                <DataTable headers={['Nombre','Sector','Estado','E','S','Horas','Entrada vs turno','Salida vs turno','Producción','Meta','% Cumpl.','Calidad','Semáforo']} rows={day.items.slice().sort((a,b)=>String(a.nombre).localeCompare(String(b.nombre))).map(r=>[r.nombre,r.sector,<StatusBadge key={r.id+'s'} value={r.estadoDia}/>,r.entrada||'—',r.salida||'—',r.horas,entryStatus(r),exitStatus(r),r.tipoEmpleado==='Operario'?r.produccionReal:'—',r.metaDiaria||'—',r.tipoEmpleado==='Operario'?`${r.cumplimiento}%`:'—',r.calidad,<Badge key={r.id+'b'} value={r.semaforo}/>])} searchQ={globalSearch}/>
              </div>
            </details>;
          })}
        </div>
        </>}
      </div>}

      {tab==='PRESENTISMO'&&<div>
        <SecH title='Presentismo' subtitle='Carga manual o importada. Maneja E y S sin mezclarlo con producción.' right={<><BtnP onClick={()=>setShowAttendanceImport(true)}>📥 Importar presentismo</BtnP><BtnN onClick={()=>setTab('CARGA_DIARIA')}>Ir a carga diaria</BtnN></>} />
        {!activeEmployees.length?<Card style={{textAlign:'center',padding:'40px'}}><div style={{fontSize:'42px',marginBottom:'10px'}}>🧑‍🏭</div><div style={{fontSize:'18px',fontWeight:800,color:C.s800,marginBottom:'6px'}}>No hay personal activo</div><div style={{color:C.s500}}>Cargá empleados antes de registrar presentismo.</div></Card>:<div style={{display:'grid',gridTemplateColumns:gridCols('1fr 1fr'),gap:'16px'}}>
          <Card>
            <CardTitle>🟢 Carga manual de presentismo</CardTitle>
            <div style={{display:'grid',gridTemplateColumns:gridCols('1fr 1fr'),gap:'12px',marginBottom:'16px'}}>
              <Field label='Fecha'><DateInp value={presentForm.fecha} onChange={e=>setPresentForm(p=>({...p,fecha:e.target.value}))}/></Field>
              <Field label='Empleado'><Sel value={presentForm.legajo} onChange={e=>setPresentForm(p=>({...p,legajo:e.target.value}))}>{activeEmployees.map(e=><option key={e.id} value={e.legajo}>{e.nombre} ({e.legajo})</option>)}</Sel></Field>
              <Field label='Estado'><Sel value={presentForm.estadoDia} onChange={e=>setPresentForm(p=>({...p,estadoDia:e.target.value}))}>{DAY_ST.map(st=><option key={st} value={st}>{st}</option>)}</Sel></Field>
              <Field label='Observación rápida'><Inp value={presentForm.observaciones} onChange={e=>setPresentForm(p=>({...p,observaciones:e.target.value}))}/></Field>
              <Field label='Entrada (E)'><Inp type='time' value={presentForm.entrada} onChange={e=>setPresentForm(p=>({...p,entrada:e.target.value}))}/></Field>
              <Field label='Salida (S)'><Inp type='time' value={presentForm.salida} onChange={e=>setPresentForm(p=>({...p,salida:e.target.value}))}/></Field>
            </div>
            <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}><BtnP onClick={addAttendance}>💾 Guardar presentismo</BtnP><BtnN onClick={()=>setPresentForm(p=>({...p,entrada:'',salida:'',observaciones:''}))}>Limpiar</BtnN></div>
          </Card>
          <Card style={{background:`linear-gradient(150deg,${C.emeraldL},${C.skyL})`}}>
            <CardTitle color={C.emeraldD}>👁️ Vista previa</CardTitle>
            {presentPreview?<div style={{display:'grid',gridTemplateColumns:gridCols('1fr 1fr'),gap:'10px'}}>
              <KPI label='Empleado' value={presentPreview.nombre} bg={C.white} color={C.emeraldD}/>
              <KPI label='Sector' value={presentPreview.sector} bg={C.white} color={C.skyD}/>
              <KPI label='Estado' value={presentPreview.estadoDia} bg={C.white} color={C.s800}/>
              <KPI label='Horas' value={presentPreview.horas} bg={C.white}/>
              <div style={{background:C.white,borderRadius:'12px',padding:'1rem',border:`1px solid ${C.s200}`}}><SLabel>E / S</SLabel><div style={{fontSize:'20px',fontWeight:800,color:C.s800}}>{presentPreview.entrada||'—'} / {presentPreview.salida||'—'}</div></div>
              <div style={{background:C.white,borderRadius:'12px',padding:'1rem',border:`1px solid ${C.s200}`}}><SLabel>Registro existente</SLabel><div style={{fontSize:'13px',color:C.s700}}>{records.some(r=>r.fecha===presentForm.fecha&&r.legajo===presentForm.legajo)?'Se actualizará el registro de esa fecha':'Se creará un registro nuevo'}</div></div>
              <KPI label='Entrada vs turno' value={entryStatus(presentPreview)} bg={C.white} color={C.indigoD}/>
              <KPI label='Salida vs turno' value={exitStatus(presentPreview)} bg={C.white} color={C.violetD}/>
            </div>:<div style={{color:C.s500}}>Seleccioná empleado.</div>}
            <div style={{marginTop:'14px',padding:'12px',background:'rgba(255,255,255,.65)',borderRadius:'12px',fontSize:'12px',color:C.s700}}>Acá cargás solo asistencia, horarios y estado. La producción va en la otra solapa.</div>
          </Card>
        </div>}
        <div style={{marginTop:'16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',gap:'10px',flexWrap:'wrap',marginBottom:'10px'}}>
            <SLabel>Presentismo cargado</SLabel>
            <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
              <DateInp value={presentListFilters.fecha} onChange={e=>setPresentListFilters(p=>({...p,fecha:e.target.value}))} style={{width:'150px'}}/>
              <Sel value={presentListFilters.legajo} onChange={e=>setPresentListFilters(p=>({...p,legajo:e.target.value}))} style={{width:'240px'}}><option value='Todos'>Todos los operarios</option>{activeEmployees.map(e=><option key={e.id} value={e.legajo}>{e.nombre} ({e.legajo})</option>)}</Sel>
              <BtnN onClick={()=>setPresentListFilters({fecha:presentForm.fecha,legajo:'Todos'})}>Usar fecha del formulario</BtnN>
            </div>
          </div>
          <DataTable headers={['Fecha','Legajo','Nombre','Sector','Estado','E','S','Horas','Entrada vs turno','Salida vs turno','Producción vinculada','Observaciones','Acción']} rows={presentTableRecords.map(r=>[fmtDate(r.fecha),r.legajo,r.nombre,r.sector,<StatusBadge key={r.id+'st'} value={r.estadoDia}/>,r.entrada||'—',r.salida||'—',r.horas,entryStatus(r),exitStatus(r),r.produccionReal,r.observaciones||'—',<BtnD key={r.id+'d'} onClick={()=>deleteRecord(r.id)}>Eliminar</BtnD>])} searchQ={globalSearch}/>
        </div>
      </div>}

      {tab==='CARGA_DIARIA'&&<div>
        <SecH title='Carga diaria' subtitle='Solo producción y calidad. Si ya existe presentismo, completa el mismo registro.' right={<><BtnP onClick={()=>setShowDailyImport(true)}>📥 Importar producción</BtnP><BtnN onClick={()=>setTab('PRESENTISMO')}>Ir a presentismo</BtnN></>} />
        {!activeEmployees.length?<Card style={{textAlign:'center',padding:'40px'}}><div style={{fontSize:'42px',marginBottom:'10px'}}>📊</div><div style={{fontSize:'18px',fontWeight:800,color:C.s800,marginBottom:'6px'}}>No hay personal activo</div><div style={{color:C.s500}}>Cargá empleados antes de registrar producción.</div></Card>:<div style={{display:'grid',gridTemplateColumns:gridCols('1fr 1fr'),gap:'16px'}}>
          <Card>
            <CardTitle>📝 Carga manual de producción</CardTitle>
            <div style={{display:'grid',gridTemplateColumns:gridCols('1fr 1fr'),gap:'12px',marginBottom:'16px'}}>
              <Field label='Fecha'><DateInp value={dailyForm.fecha} onChange={e=>setDailyForm(p=>({...p,fecha:e.target.value}))}/></Field>
              <Field label='Empleado'><Sel value={dailyForm.legajo} onChange={e=>{const leg=e.target.value;const emp=activeEmployees.find(x=>x.legajo===leg);setDailyForm(p=>({...p,legajo:leg,calidad:emp?.tipoEmpleado==='Operario'?'Sin errores':'No aplica'}));}}>{activeEmployees.map(e=><option key={e.id} value={e.legajo}>{e.nombre} ({e.legajo})</option>)}</Sel></Field>
              <Field label='Producción real'><Inp type='number' min='0' value={dailyForm.produccionReal} onChange={e=>setDailyForm(p=>({...p,produccionReal:e.target.value}))}/></Field>
              <Field label='Calidad'><Sel value={dailyForm.calidad} onChange={e=>setDailyForm(p=>({...p,calidad:e.target.value}))}>{QUAL.map(q=><option key={q} value={q}>{q}</option>)}</Sel></Field>
              <div style={{gridColumn:'span 2'}}><Field label='Observaciones'><Txt value={dailyForm.observaciones} onChange={e=>setDailyForm(p=>({...p,observaciones:e.target.value}))}/></Field></div>
            </div>
            <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}><BtnP onClick={addProduction}>💾 Guardar producción</BtnP><BtnN onClick={()=>setDailyForm(p=>({...p,produccionReal:'',observaciones:''}))}>Limpiar</BtnN></div>
