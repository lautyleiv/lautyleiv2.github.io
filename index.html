<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Integral de Planta</title>
  <meta name="theme-color" content="#2563eb">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --blue:#2563eb;
      --blue-700:#1d4ed8;
      --blue-50:#eff6ff;
      --blue-100:#dbeafe;
      --ink:#1e293b;
      --text:#334155;
      --muted:#64748b;
      --soft:#94a3b8;
      --line:#e5e7eb;
      --line2:#eef2f7;
      --bg:#f8fafc;
      --card:#ffffff;
      --green:#16a34a;
      --green-50:#ecfdf3;
      --red:#ef4444;
      --red-50:#fef2f2;
      --orange:#f59e0b;
      --orange-50:#fffbeb;
      --violet:#7c3aed;
      --violet-50:#f5f3ff;
      --shadow:0 18px 48px rgba(15,23,42,.065);
      --shadow2:0 10px 28px rgba(15,23,42,.045);
      --radius:24px;
      --radius2:18px;
      --sidebar:268px;
      --top:76px;
      --font:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      font-family:var(--font);
      color:var(--ink);
      background:
        radial-gradient(circle at 0 0, rgba(37,99,235,.07), transparent 28%),
        linear-gradient(180deg,#fff 0%,#f8fafc 48%,#fff 100%);
      letter-spacing:-.01em;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .app{min-height:100vh;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr)}
    .sidebar{
      position:sticky;top:0;height:100vh;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);
      border-right:1px solid var(--line);padding:22px 18px;z-index:40;display:flex;flex-direction:column;gap:18px;
    }
    .brand{display:flex;align-items:center;gap:12px;padding:6px 8px 20px;border-bottom:1px solid var(--line)}
    .logo{width:44px;height:44px;border-radius:16px;background:var(--blue);display:grid;place-items:center;color:#fff;box-shadow:0 15px 30px rgba(37,99,235,.22)}
    .logo svg{width:22px;height:22px}
    .brand h1{font-size:15px;line-height:1.1;margin:0;font-weight:850;letter-spacing:-.04em;color:var(--ink)}
    .brand p{font-size:12px;color:var(--muted);margin:4px 0 0}
    .nav{display:grid;gap:6px;overflow:auto;padding-right:2px;flex:1}
    .nav button{
      height:48px;border:0;background:transparent;color:var(--text);border-radius:16px;padding:0 12px;display:flex;align-items:center;gap:12px;
      font-weight:750;text-align:left;transition:.18s ease;
    }
    .nav button:hover{background:#f1f5f9}
    .nav button.active{background:var(--blue-50);color:var(--blue)}
    .nav svg{width:20px;height:20px;flex:none}
    .side-card{border:1px solid var(--line);background:#fff;border-radius:20px;padding:15px;box-shadow:var(--shadow2)}
    .side-card strong{display:block;font-size:13px;margin-bottom:6px}
    .side-card p{font-size:12px;line-height:1.45;color:var(--muted);margin:0 0 12px}
    .main{min-width:0;display:flex;flex-direction:column}
    .topbar{height:var(--top);position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 30px;background:rgba(248,250,252,.88);backdrop-filter:blur(18px);border-bottom:1px solid rgba(229,231,235,.86)}
    .top-left{display:flex;align-items:center;gap:14px;min-width:0}
    .menu-btn{display:none;width:44px;height:44px;border-radius:15px;border:1px solid var(--line);background:#fff;color:var(--ink);align-items:center;justify-content:center}
    .page-name{min-width:0}
    .page-name strong{display:block;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .page-name span{display:block;margin-top:3px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-actions{display:flex;align-items:center;gap:10px}
    .round{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:#fff;color:#475569;display:grid;place-items:center}
    .admin{height:42px;border:1px solid var(--line);border-radius:999px;background:#fff;display:flex;align-items:center;gap:8px;padding:5px 12px;font-size:13px;font-weight:800}
    .avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-50);color:var(--blue);display:grid;place-items:center;font-weight:850}
    .content{width:100%;max-width:1500px;margin:0 auto;padding:30px 30px 44px}
    .page{display:none;animation:enter .18s ease}
    .page.active{display:block}
    @keyframes enter{from{opacity:.4;transform:translateY(5px)}to{opacity:1;transform:none}}
    .hero{margin-bottom:26px;display:flex;align-items:flex-end;justify-content:space-between;gap:22px;position:relative}
    .hero:before,.hero:after{content:"";position:absolute;top:25px;height:2px;border-radius:999px;background:var(--blue);opacity:.9}
    .hero:before{right:calc(100% - 330px);width:120px;display:none}.hero:after{right:0;width:26%}
    .hero h2{margin:0;font-size:42px;line-height:1.05;font-weight:880;letter-spacing:-.055em;color:var(--ink)}
    .hero p{margin:9px 0 0;color:var(--muted);font-size:17px}
    .hero-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px}
    .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius2);box-shadow:var(--shadow2)}
    .section-title{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
    .section-title h3{margin:0;font-size:20px;font-weight:850;letter-spacing:-.04em}
    .section-title p{margin:5px 0 0;color:var(--muted);font-size:13px}
    .grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px}
    .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .metric{background:#fff;border:1px solid var(--line);border-radius:20px;padding:21px;min-height:120px;box-shadow:var(--shadow2);display:flex;justify-content:space-between;gap:16px;overflow:hidden;position:relative}
    .metric:after{content:"";position:absolute;right:-34px;bottom:-34px;width:92px;height:92px;border-radius:50%;background:var(--blue-50)}
    .metric .label{font-size:14px;font-weight:850;color:var(--text);margin-bottom:12px}
    .metric .value{font-size:32px;line-height:1;font-weight:880;color:var(--ink);letter-spacing:-.055em}
    .metric .sub{font-size:13px;color:var(--muted);margin-top:10px}
    .metric .icon{z-index:1;width:48px;height:48px;border-radius:16px;background:var(--blue-50);color:var(--blue);display:grid;place-items:center;flex:none}
    .metric.green .icon,.metric.green:after{background:var(--green-50);color:var(--green)}
    .metric.red .icon,.metric.red:after{background:var(--red-50);color:var(--red)}
    .metric.orange .icon,.metric.orange:after{background:var(--orange-50);color:var(--orange)}
    .btn{height:48px;border-radius:13px;border:1px solid var(--line);background:#fff;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:0 18px;font-weight:800;white-space:nowrap;transition:.16s ease;text-decoration:none}
    .btn:hover{background:#f8fafc;border-color:#cbd5e1}
    .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 13px 28px rgba(37,99,235,.18)}
    .btn.primary:hover{background:var(--blue-700)}
    .btn.soft{background:var(--blue-50);border-color:transparent;color:var(--blue)}
    .btn.danger{color:#dc2626;border-color:#fecaca;background:#fff}
    .btn.danger:hover{background:#fef2f2}
    .btn.small{height:38px;border-radius:11px;padding:0 12px;font-size:13px}
    .icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:#fff;color:#475569;display:inline-grid;place-items:center;transition:.16s}
    .icon-btn:hover{background:#f8fafc;border-color:#cbd5e1;color:var(--ink)}
    .danger-text{color:#dc2626}
    .field{display:grid;gap:7px;min-width:0}
    .field label{font-size:13px;font-weight:850;color:var(--text)}
    input,select,textarea{width:100%;border:1px solid #dde5f0;border-radius:13px;background:#fff;outline:none;min-height:50px;padding:0 14px;color:var(--ink);transition:.16s}
    textarea{padding:13px 14px;min-height:120px;resize:vertical;line-height:1.45}
    input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.09)}
    .form-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;align-items:end}
    .form-grid.three{grid-template-columns:repeat(3,minmax(0,1fr)) auto}
    .form-grid.two{grid-template-columns:repeat(2,minmax(0,1fr)) auto}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}
    table{width:100%;border-collapse:collapse;min-width:720px}
    th,td{padding:15px 17px;border-bottom:1px solid var(--line2);text-align:left;font-size:14px;white-space:nowrap;vertical-align:middle}
    th{font-size:13px;text-transform:none;color:#475569;background:#fbfcfe;font-weight:880}
    tr:last-child td{border-bottom:0}
    .right{text-align:right}.center{text-align:center}.muted{color:var(--muted)}
    .pill{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:30px;padding:5px 12px;border-radius:10px;font-size:13px;font-weight:850}
    .pill.green{background:var(--green-50);color:var(--green)}
    .pill.red{background:var(--red-50);color:var(--red)}
    .pill.orange{background:var(--orange-50);color:#d97706}
    .pill.blue{background:var(--blue-50);color:var(--blue)}
    .pill.gray{background:#f1f5f9;color:#475569}
    .pill.violet{background:var(--violet-50);color:var(--violet)}
    .chart-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow2);min-height:312px}
    .chart-card h3{font-size:16px;margin:0 0 14px;font-weight:850}
    canvas{width:100%;height:238px;display:block}
    .dashboard-grid{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(360px,.8fr);gap:18px;margin-top:18px}
    .summary-list{display:grid;gap:14px}
    .rank-row{display:grid;grid-template-columns:120px 1fr 86px;gap:12px;align-items:center}
    .bar{height:9px;background:#eef2f7;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--blue);border-radius:inherit}
    .import-boxes{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .import-box{border:1px solid var(--line);border-radius:18px;background:#fff;padding:20px;display:grid;gap:12px;box-shadow:var(--shadow2)}
    .import-head{display:flex;align-items:center;gap:12px}.import-head .icon{width:44px;height:44px;border-radius:15px;background:var(--blue-50);color:var(--blue);display:grid;place-items:center}
    .preview-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-top:16px}
    .split{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:18px}
    .summary-side{display:grid;gap:16px}
    .summary-block{border:1px solid var(--line);border-radius:18px;background:#fff;padding:18px;box-shadow:var(--shadow2)}
    .summary-block h4{margin:0 0 12px;font-size:16px}.summary-block p{margin:0;color:var(--muted);line-height:1.45;font-size:13px}
    .mini-stat{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line2);padding:12px 0}.mini-stat:first-of-type{border-top:0}.mini-stat strong{font-size:22px}
    .week-selector{display:inline-flex;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff;margin-bottom:18px}
    .week-selector button{width:46px;border:0;background:#fff;font-size:18px;color:#475569}.week-selector span{display:grid;place-items:center;padding:0 20px;font-weight:800;min-height:46px;border-left:1px solid var(--line);border-right:1px solid var(--line)}
    .dot{width:12px;height:12px;border-radius:50%;display:inline-block}.dot.green{background:var(--green)}.dot.orange{background:var(--orange)}.dot.red{background:var(--red)}.dot.gray{background:#cbd5e1}.dot.blue{background:var(--blue)}
    .employee-detail{padding:22px}.employee-head{display:flex;align-items:center;gap:14px;padding-bottom:18px;border-bottom:1px solid var(--line)}
    .big-avatar{width:64px;height:64px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:22px;font-weight:880}.employee-head h3{margin:0;font-size:20px}.employee-head p{margin:5px 0 0;color:var(--muted)}
    .detail-list{display:grid;gap:14px;margin-top:18px}.detail-line{display:grid;grid-template-columns:1fr auto;gap:14px;color:#475569}.detail-line strong{color:var(--ink)}
    .salt-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(430px,.9fr);gap:18px;margin-top:18px}
    .employee-actions{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
    .empty{padding:34px;text-align:center;color:var(--muted);border:1px dashed #cbd5e1;border-radius:18px;background:#fff}
    .toast{position:fixed;right:22px;bottom:22px;z-index:90;background:var(--ink);color:#fff;border-radius:16px;padding:14px 18px;box-shadow:0 24px 60px rgba(15,23,42,.25);font-weight:750;opacity:0;transform:translateY(14px);pointer-events:none;transition:.2s;max-width:min(420px,calc(100vw - 44px))}
    .toast.show{opacity:1;transform:none}
    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.42);z-index:80;display:none;place-items:center;padding:18px}.modal-backdrop.show{display:grid}
    .modal{width:min(620px,100%);background:#fff;border-radius:24px;border:1px solid var(--line);box-shadow:0 30px 80px rgba(15,23,42,.25);padding:24px}.modal h3{margin:0 0 8px;font-size:22px}.modal p{margin:0;color:var(--muted);line-height:1.5}.modal-actions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;margin-top:20px}.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
    .reset-options{display:grid;gap:12px;margin-top:16px}.reset-option{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff}.reset-option strong{display:block;margin-bottom:5px}.reset-option p{font-size:13px;margin:0 0 12px;color:var(--muted)}
    .mobile-nav{display:none}.overlay{display:none}
    .hide{display:none!important}
    @media(max-width:1180px){.grid-4{grid-template-columns:repeat(2,1fr)}.dashboard-grid,.split,.salt-grid{grid-template-columns:1fr}.form-grid,.form-grid.three,.form-grid.two{grid-template-columns:repeat(2,1fr)}.import-boxes{grid-template-columns:1fr}.hero:after{display:none}.summary-side{grid-template-columns:repeat(3,1fr)}.employee-actions{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:900px){:root{--sidebar:0px}.app{display:block}.sidebar{position:fixed;left:0;top:0;width:286px;transform:translateX(-104%);transition:.22s;box-shadow:0 30px 90px rgba(15,23,42,.22)}.sidebar.open{transform:none}.overlay.show{display:block;position:fixed;inset:0;background:rgba(15,23,42,.28);z-index:35}.menu-btn{display:flex}.content{padding:22px 16px 96px}.topbar{height:68px;padding:0 16px}.top-actions .round,.top-actions .admin span,.top-actions .desktop-only{display:none}.hero{align-items:flex-start;flex-direction:column}.hero h2{font-size:34px}.hero p{font-size:15px}.grid-4,.grid-3,.grid-2,.summary-side,.employee-actions{grid-template-columns:1fr}.form-grid,.form-grid.three,.form-grid.two{grid-template-columns:1fr}.panel{padding:20px;border-radius:21px}.metric .value{font-size:28px}.table-wrap{border-radius:15px}.modal-grid{grid-template-columns:1fr}.mobile-nav{position:fixed;left:0;right:0;bottom:0;height:72px;display:grid;grid-template-columns:repeat(5,1fr);background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);z-index:60}.mobile-nav button{border:0;background:transparent;display:grid;place-items:center;color:#64748b;font-size:11px;font-weight:850}.mobile-nav button.active{color:var(--blue)}.mobile-nav svg{width:20px;height:20px;margin-bottom:3px}.chart-card{min-height:280px}canvas{height:220px}}
    @media(max-width:520px){.content{padding-left:12px;padding-right:12px}.btn{width:100%}.hero-actions{width:100%}.hero-actions .btn{width:100%}.preview-actions{align-items:stretch}.metric{min-height:110px}.section-title{align-items:flex-start;flex-direction:column}.rank-row{grid-template-columns:90px 1fr 62px}.modal-actions .btn{width:100%}}
  </style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo" id="logoIcon"></div>
      <div>
        <h1>Panel Integral de Planta</h1>
        <p>Producción · Presentismo · Sal</p>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-card">
      <strong>Base local</strong>
      <p>Los datos se guardan en este navegador. Hacé backup antes de borrar o cambiar de equipo.</p>
      <button class="btn danger small" id="openResetSide">Restablecer datos</button>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="top-left">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div class="page-name">
          <strong id="topTitle">Dashboard</strong>
          <span id="topSub">Vista principal con indicadores clave</span>
        </div>
      </div>
      <div class="top-actions">
        <button class="round" title="Notificaciones" id="bellIcon"></button>
        <button class="round" title="Ayuda">?</button>
        <button class="btn desktop-only" id="exportBackupBtn">Exportar backup</button>
        <button class="btn danger desktop-only" id="openResetTop">Restablecer datos</button>
        <div class="admin"><div class="avatar">AD</div><span>Administrador</span></div>
      </div>
    </header>
    <section class="content" id="content"></section>
  </main>
</div>
<nav class="mobile-nav" id="mobileNav"></nav>
<div class="toast" id="toast"></div>
<div class="modal-backdrop" id="modalBackdrop"></div>

<script>
(() => {
  const STORAGE_KEY = 'panelPlantaMinimal_v3_appReal';
  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
  const fmt = new Intl.NumberFormat('es-AR');

  const Icons = {
    plant:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V8l5 3V8l5 3V5h4v16"/><path d="M8 17h1M12 17h1M16 17h1"/></svg>`,
    dashboard:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="8" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="15" width="7" height="6" rx="2"/></svg>`,
    plus:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>`,
    users:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
    clock:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`,
    chart:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m7 15 4-4 3 3 5-7"/></svg>`,
    file:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`,

  const arToISO = s => {
    if(!s) return '';
    s = String(s).trim();
    if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const m = s.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if(!m) return '';
    let y = m[3].length === 2 ? '20' + m[3] : m[3];
    return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  };

    return {
      prod:prod.reduce((a,b)=>a+num(b.qty),0),
      present:att.filter(a=>norm(a.status).includes('presente') || norm(a.status).includes('retraso') || norm(a.status).includes('salida')).length,

  function filterAttendance(date,turno,estado){

  function attendanceSummary(rows){
    return {

      retrasos: rows.filter(r=>r.status==='Retraso').length,

  function weekStart(iso){ const d = new Date(iso+'T00:00:00'); const day = d.getDay() || 7; d.setDate(d.getDate()-day+1); return d.toISOString().slice(0,10); }
  function dayLabel(iso){ const d = new Date(iso+'T00:00:00'); return ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][d.getDay()] + ' ' + iso.slice(-2); }
  function countAttendance(name,days){return days.slice(0,5).filter(d=>state.attendance.some(a=>a.employee===name&&a.date===d&&a.status!=='Ausente')).length;}
  function trackingRow(e,days){
    const statuses = days.map(d=>{
      const a = state.attendance.find(x=>x.employee===e.name&&x.date===d);
      if(!a) return 'gray';
      if(a.status==='Ausente') return 'red';
      if(a.status==='Retraso'||a.status==='Salida anticipada') return 'orange';
      return 'green';
    });
    const score = statuses.slice(0,5).reduce((s,x)=>s+(x==='green'?2:x==='orange'?1:x==='red'?-1:0),0);
    const status = score>=8?'Óptimo':score>=4?'Regular':'Revisar';
    return `<tr><td>${esc(e.name)}</td>${statuses.map(s=>`<td class="center"><i class="dot ${s}"></i></td>`).join('')}<td>${pill(status)}</td></tr>`;

  function processMessage(){
    const text = $('#messageImport').value;
    if(!text.trim()){toast('Pegá un mensaje para procesar.');return;}
    const lines = text.split(/\n+/).map(x=>x.trim()).filter(Boolean);
    let sector = 'Sin sector';
    const dateLine = lines.find(l=>/fecha|\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/i.test(l));
    const date = arToISO(dateLine) || $('#prodDate')?.value || todayISO();
    let added = 0;
    for(const line of lines){
      if(/^[-–]?\s*[A-Za-zÁÉÍÓÚÜÑáéíóúüñ ]+\s*$/i.test(line) && !line.includes(':')){ sector = line.replace(/^[-–]\s*/,'').trim(); continue; }
      if(/sal\s*:/i.test(line)) continue;
      const m = line.match(/^([^:]+):\s*([\d.,]+)/);
      if(m){
        state.preview.push({id:uid('prev_'),date,employee:m[1].trim(),sector,qty:num(m[2]),salt:0,source:'WhatsApp',note:''});
        added++;
      }
    }
    save(); render(); toast(`Se procesaron ${added} registros del mensaje.`);
  }
  async function processFile(){
    const f = $('#fileImport').files[0];
    if(!f){toast('Seleccioná un archivo.');return;}
    const ext = f.name.split('.').pop().toLowerCase();
    let rows = [];
    if(ext==='csv'){
      const text = await f.text(); rows = parseCSV(text);
    }else if(window.XLSX){
      const data = await f.arrayBuffer();
      const wb = XLSX.read(data,{type:'array'}); const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws,{defval:''});
    }else{ toast('No se pudo cargar el lector Excel. Probá CSV.'); return; }
    let added=0;
    rows.forEach(row=>{
      const get = (...keys) => keys.map(k=>row[k]).find(v=>v!==undefined&&v!=='') ?? '';
      const date = arToISO(get('Fecha','fecha','Día','Dia','date')) || todayISO();
      const employee = get('Empleado','Operario','Nombre','employee');
      const sector = get('Sector','Línea','Linea','Área','Area') || 'Sin sector';
      const qty = num(get('Cantidad','Producción','Produccion','Unidades','Kilos','kg'));
      const salt = num(get('Sal','Sal usada','sal'));
      if(qty){ state.preview.push({id:uid('prev_'),date,employee,sector,qty,salt,source:'Excel',note:''}); added++; }
    });
    save(); render(); toast(`Archivo procesado: ${added} registros a vista previa.`);
  }
  function parseCSV(text){
    const lines = text.split(/\r?\n/).filter(Boolean); if(!lines.length) return [];
    const sep = lines[0].includes(';')?';':',';
    const headers = lines.shift().split(sep).map(h=>h.trim());
    return lines.map(line=>{const vals=line.split(sep); let o={}; headers.forEach((h,i)=>o[h]=vals[i]?.trim()||''); return o;});
  }

    $('#saveEmp').onclick = ()=>{
      const ne = {id:$('#empId').value.trim(),name:$('#empName').value.trim(),area:$('#empArea').value.trim(),turno:$('#empTurno').value,role:$('#empRole').value,status:$('#empStatus').value};
      if(!ne.id||!ne.name){toast('Completá ID y nombre.');return;}
      if(id){ const idx=state.employees.findIndex(x=>x.id===id); state.employees[idx]=ne; } else { state.employees.push(ne); }
      save(); closeModal(); render(); toast('Empleado guardado.');
    };
  }
  function toggleEmployee(id){
    const e = state.employees.find(x=>x.id===id); if(!e) return;
    e.status = e.status==='Baja'?'Activo':'Baja'; save(); render(); toast(e.status==='Baja'?'Empleado dado de baja.':'Empleado restaurado.');
  }

  function openReset(){
    openModal(`<h3>Restablecer datos</h3><p>Elegí qué querés borrar. Antes de borrar podés exportar un backup completo.</p>
      <div class="reset-options">
        <div class="reset-option"><strong>Borrar datos operativos</strong><p>Borra producción, presentismo, sal y vista previa. Conserva empleados.</p><button class="btn danger" id="resetOperational">Borrar operativos</button></div>
        <div class="reset-option"><strong>Empezar de cero completo</strong><p>Borra todo: empleados, producción, presentismo, sal y vista previa.</p><button class="btn danger" id="resetAll">Borrar todo</button></div>
        <div class="reset-option"><strong>Restaurar datos de ejemplo</strong><p>Carga nuevamente los datos demo para probar el sistema.</p><button class="btn" id="resetDemo">Restaurar demo</button></div>
      </div><div class="modal-actions"><button class="btn" id="modalBackup">Exportar backup</button><button class="btn" data-close>Cerrar</button></div>`);
    $('#modalBackup').onclick = exportBackup;
    $('#resetOperational').onclick = ()=>confirmReset('operational');
    $('#resetAll').onclick = ()=>confirmReset('all');
    $('#resetDemo').onclick = ()=>{state=demo();save();closeModal();render();toast('Datos de ejemplo restaurados.');};
  }
  function confirmReset(type){
    const msg = type==='all'?'BORRAR TODO':'BORRAR OPERATIVOS';
    const ok = prompt(`Para confirmar escribí: ${msg}`);
    if(ok!==msg){toast('Restablecimiento cancelado.');return;}
    if(type==='all') state = {currentPage:'dashboard',employees:[],production:[],attendance:[],salt:[],preview:[]};
    else {state.production=[];state.attendance=[];state.salt=[];state.preview=[];}
    save(); closeModal(); render(); toast('Datos restablecidos correctamente.');
  }
  function openModal(html){
    $('#modalBackdrop').innerHTML = `<div class="modal">${html}</div>`;
    $('#modalBackdrop').classList.add('show');
    $$('[data-close]', $('#modalBackdrop')).forEach(b=>b.onclick=closeModal);
    $('#modalBackdrop').onclick = e=>{if(e.target.id==='modalBackdrop')closeModal();};
  }
  function closeModal(){ $('#modalBackdrop').classList.remove('show'); }

  function exportBackup(){ download('backup_panel_planta.json', JSON.stringify(state,null,2), 'application/json'); }
  async function importBackup(){
    const f = $('#importBackup').files[0]; if(!f){toast('Seleccioná un backup JSON.');return;}
    try{ state = JSON.parse(await f.text()); save(); render(); toast('Backup importado correctamente.'); }catch(e){toast('No se pudo importar el backup.');}
  }
  function exportCSV(filename, rows){
    if(!rows || !rows.length){toast('No hay datos para exportar.');return;}
    const headers = Object.keys(rows[0]);
    const csv = [headers.join(';'), ...rows.map(r=>headers.map(h=>`"${String(r[h]??'').replace(/"/g,'""')}"`).join(';'))].join('\n');
    download(filename, csv, 'text/csv;charset=utf-8');
  }
  function download(name, content, type){
    const blob = new Blob([content], {type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href);
  }
  function dashboardRows(){ const t=totalsToday(); return [{fecha:todayISO(),produccion:t.prod,presentes:t.present,ausentes:t.absent,sal:t.salt}]; }
  function trackingExportRows(){ return state.employees.map(e=>({empleado:e.name,area:e.area,turno:e.turno,estado:e.status})); }
  function groupSum(rows,key,val){return rows.reduce((acc,r)=>{const k=r[key]||'Sin dato';acc[k]=(acc[k]||0)+num(r[val]);return acc;},{});}
  function initials(name){return String(name).split(/[ ,]+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'AD';}

  function drawVisibleCharts(){
    if($('#lineProd')) drawLine($('#lineProd'), hourlyData(), {label:'Producción'});
    if($('#donutAtt')) { const t=totalsToday(); drawDonut($('#donutAtt'), [t.present,t.absent], ['Presentes','Ausentes']); }
    if($('#saltChart')) drawLine($('#saltChart'), saltData(), {label:'Consumo'});
  }
  function hourlyData(){
    const labels=['06:00','08:00','10:00','12:00','14:00','16:00','18:00'];
    const total=totalsToday().prod; const base=total || 1250000;
    const parts=[.10,.16,.26,.20,.15,.09,.04];
    return labels.map((l,i)=>({label:l,value:Math.round(base*parts[i])}));
  }
  function saltData(){
    return Array.from({length:7},(_,i)=>{const d=addDays(todayISO(),i-6);return {label:d.slice(5).split('-').reverse().join('/'),value:state.salt.filter(s=>s.date===d&&s.type==='Salida').reduce((a,b)=>a+num(b.kg),0)}});
  }
  function drawLine(canvas,data){
    const ctx=canvas.getContext('2d'); const dpr=window.devicePixelRatio||1; const rect=canvas.getBoundingClientRect(); canvas.width=rect.width*dpr; canvas.height=rect.height*dpr; ctx.scale(dpr,dpr);
    const w=rect.width,h=rect.height,pad=36; ctx.clearRect(0,0,w,h); ctx.font='12px '+getComputedStyle(document.body).fontFamily; ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
    const max=Math.max(...data.map(d=>d.value),1)*1.15;
    for(let i=0;i<4;i++){const y=pad+(h-pad*2)*i/3; ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke(); ctx.fillStyle='#94a3b8'; ctx.fillText(Math.round(max*(1-i/3)).toLocaleString('es-AR'),4,y+4);}
    const pts=data.map((d,i)=>({x:pad+(w-pad*2)*i/(data.length-1), y:h-pad-(h-pad*2)*d.value/max, ...d}));
    ctx.beginPath(); pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.strokeStyle='#2563eb'; ctx.lineWidth=3; ctx.stroke();
    ctx.lineTo(pts.at(-1).x,h-pad); ctx.lineTo(pts[0].x,h-pad); ctx.closePath(); const grad=ctx.createLinearGradient(0,pad,0,h-pad); grad.addColorStop(0,'rgba(37,99,235,.18)'); grad.addColorStop(1,'rgba(37,99,235,0)'); ctx.fillStyle=grad; ctx.fill();
    pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle='#2563eb';ctx.fill();ctx.fillStyle='#64748b';ctx.fillText(p.label,p.x-16,h-10);});
  }
  function drawDonut(canvas,vals,labels){
    const ctx=canvas.getContext('2d'); const dpr=window.devicePixelRatio||1; const rect=canvas.getBoundingClientRect(); canvas.width=rect.width*dpr; canvas.height=rect.height*dpr; ctx.scale(dpr,dpr);
    const w=rect.width,h=rect.height; ctx.clearRect(0,0,w,h); const total=vals.reduce((a,b)=>a+b,0)||1; const cx=w*.42, cy=h*.48, r=Math.min(w,h)*.28; let start=-Math.PI/2; const colors=['#16a34a','#ef4444'];
    vals.forEach((v,i)=>{const end=start+(v/total)*Math.PI*2;ctx.beginPath();ctx.arc(cx,cy,r,start,end);ctx.lineWidth=24;ctx.strokeStyle=colors[i];ctx.stroke();start=end;});
    ctx.fillStyle='#1e293b';ctx.font='800 28px '+getComputedStyle(document.body).fontFamily;ctx.textAlign='center';ctx.fillText(Math.round(vals[0]/total*100)+'%',cx,cy+8);
    ctx.textAlign='left';ctx.font='13px '+getComputedStyle(document.body).fontFamily; labels.forEach((l,i)=>{ctx.fillStyle=colors[i];ctx.beginPath();ctx.arc(w*.72,cy-20+i*34,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#475569';ctx.fillText(`${l} ${Math.round(vals[i]/total*100)}%`,w*.76,cy-15+i*34);});
  }

  render();
})();
</script>
</body>
</html>
