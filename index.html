        <div style={{display:'grid',gridTemplateColumns:gridCols('1fr 1fr'),gap:'14px',marginBottom:'18px'}}>
          <Card><CardTitle>📊 Rendimiento semanal</CardTitle>{weeklyFiltered.length?<div style={{overflowX:'auto',overflowY:'hidden',paddingBottom:'8px'}}><div style={{minWidth:`${seguimientoChartWidth(weeklyFiltered)}px`}}><BarChart labels={weeklyFiltered.map(it=>seguimientoChartLabel(it))} datasets={[{label:'% Rendimiento',data:weeklyFiltered.map(it=>it.rendimiento),backgroundColor:weeklyFiltered.map(it=>it.sem==='VERDE'?C.emerald:it.sem==='AMARILLO'?C.amber:it.sem==='ROJO'?C.rose:C.s400),borderRadius:5}]} height={300}/></div></div>:<div style={{height:260,display:'flex',alignItems:'center',justifyContent:'center',color:C.s400}}>Sin datos</div>}</Card>
          <Card><CardTitle>📅 Asistencia semanal</CardTitle>{weeklyFiltered.length?<div style={{overflowX:'auto',overflowY:'hidden',paddingBottom:'8px'}}><div style={{minWidth:`${seguimientoChartWidth(weeklyFiltered)}px`}}><BarChart labels={weeklyFiltered.map(it=>seguimientoChartLabel(it))} datasets={[{label:'Presentes',data:weeklyFiltered.map(it=>it.pres),backgroundColor:C.emerald,borderRadius:4},{label:'Tardes',data:weeklyFiltered.map(it=>it.tarde),backgroundColor:C.amber,borderRadius:4},{label:'Ausentes',data:weeklyFiltered.map(it=>it.ausente),backgroundColor:C.rose,borderRadius:4}]} height={300} stacked={true}/></div></div>:<div style={{height:260,display:'flex',alignItems:'center',justifyContent:'center',color:C.s400}}>Sin datos</div>}</Card>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
          {weeklyGrouped.length===0?<Card style={{textAlign:'center',padding:'30px',color:C.s500}}>Sin semanas para mostrar.</Card>:weeklyGrouped.map(([week,items])=><Card key={week} style={{borderTop:`6px solid ${weekColor(week)}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px',paddingBottom:'8px',borderBottom:`1px solid ${C.s200}`}}>
              <div style={{fontSize:'16px',fontWeight:800,color:C.s800}}>Semana {week}</div>
              <div style={{fontSize:'12px',fontWeight:700,color:C.s500}}>{items.length} registro{items.length!==1?'s':''}</div>
            </div>
            <DataTable headers={['Nombre','Sector','Días prog.','Presentes','Tardes','Ausentes','% Asistencia','% Rendimiento','Errores','Semáforo']} rows={items.map(it=>[<div key={`nm-${it.legajo}-${it.semana}`} style={{whiteSpace:'normal',lineHeight:1.25,minWidth:'190px',fontWeight:700}}>{it.nombre}</div>,it.sector,it.prog,it.pres,it.tarde,it.ausente,`${it.asistencia}%`,`${it.rendimiento}%`,it.err,<Badge key={`${it.legajo}-${it.semana}`} value={it.sem}/>])} searchQ={globalSearch}/>
          </Card>)}
        </div>
      </div>}

      {tab==='FICHA_OPERARIO'&&<div>
        <SecH title='Ficha del operario' subtitle='Ahora elegís exactamente contra quién comparar.' right={<div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
          <Sel value={fichaLeg} onChange={e=>setFichaLeg(e.target.value)} style={{width:'240px'}}>{activeEmployees.map(e=><option key={e.id} value={e.legajo}>{e.nombre} ({e.legajo})</option>)}</Sel>
          <Sel value={compareSelect} onChange={e=>setCompareSelect(e.target.value)} style={{width:'240px'}}><option value=''>Comparar con…</option>{activeEmployees.filter(e=>e.legajo!==fichaLeg&&!compareLegs.includes(e.legajo)).map(e=><option key={e.id} value={e.legajo}>{e.nombre} ({e.legajo})</option>)}</Sel>
          <BtnN onClick={addComparator}>Agregar comparación</BtnN>
        </div>} />
        {compareLegs.length>0&&<div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'14px'}}>{compareLegs.map(leg=>{const emp=employees.find(e=>e.legajo===leg);return <span key={leg} style={{display:'inline-flex',alignItems:'center',gap:'6px',padding:'6px 10px',borderRadius:'999px',background:C.indigoL,color:C.indigoD,fontSize:'12px',fontWeight:700}}>{emp?.nombre||leg}<button onClick={()=>setCompareLegs(p=>p.filter(x=>x!==leg))} style={{background:'none',border:'none',cursor:'pointer',color:C.indigoD,fontWeight:800}}>×</button></span>;})}</div>}
        {!fichaEmp?<Card style={{textAlign:'center',padding:'30px',color:C.s500}}>No hay empleados activos para mostrar.</Card>:<>
        {compareEmployees.length>1&&<Card style={{marginBottom:'16px'}}><CardTitle>📊 Comparación elegida</CardTitle>{(()=>{const lastDates=unique(records.filter(r=>compareEmployees.includes(r.legajo)).map(r=>r.fecha)).sort().slice(-10);const datasets=compareEmployees.map((leg,i)=>{const emp=employees.find(e=>e.legajo===leg);return {label:emp?.nombre.split(' ')[0]||leg,data:lastDates.map(d=>records.find(r=>r.fecha===d&&r.legajo===leg)?.cumplimiento??null),borderColor:CHART_COLORS[i],backgroundColor:'transparent',tension:0.35,pointBackgroundColor:CHART_COLORS[i],spanGaps:true};});return lastDates.length?<LineChart labels={lastDates.map(fmtDate)} datasets={datasets} height={220} yMax={130}/>:<div style={{height:220,display:'flex',alignItems:'center',justifyContent:'center',color:C.s400}}>Sin datos</div>;})()}</Card>}
        <div style={{display:'grid',gridTemplateColumns:gridCols('320px 1fr'),gap:'16px'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <div style={{background:`linear-gradient(150deg,${C.indigoL},${C.violetL})`,borderRadius:'16px',border:`1px solid ${C.s200}`,padding:'1.25rem'}}>
              <div style={{display:'grid',gridTemplateColumns:gridCols('1fr 1fr'),gap:'12px'}}>{[['Nombre',fichaEmp.nombre],['Legajo',fichaEmp.legajo],['Sector',fichaEmp.sector],['Turno',fichaEmp.turno],['Tipo',fichaEmp.tipoEmpleado],['Supervisor',fichaEmp.supervisor||'—']].map(([l,v])=><div key={l}><div style={{fontSize:'10px',fontWeight:700,color:C.indigoD,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:'3px'}}>{l}</div><div style={{fontSize:'13px',fontWeight:600,color:C.s800}}>{v}</div></div>)}</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:gridCols('1fr 1fr'),gap:'10px'}}>
              <KPI label='Asistencia' value={fichaStats.asistencia} bg={C.indigoL} color={C.indigoD}/>
              <KPI label='Prod. prom.' value={fichaStats.prodProm} bg={C.violetL} color={C.violetD}/>
              <KPI label='% Cumpl.' value={fichaStats.cumplProm} bg={C.skyL} color={C.skyD}/>
              <div style={{background:C.white,borderRadius:'12px',padding:'1rem',border:`1px solid ${C.s200}`}}><SLabel>Semáforo prom.</SLabel><Badge value={fichaStats.sem}/></div>
            </div>
            <Card><CardTitle>🚦 Semáforo histórico</CardTitle>{fichaRecs.length?<DonutChart labels={['Verde','Amarillo','Rojo','N/A']} data={[fichaRecs.filter(r=>r.semaforo==='VERDE').length,fichaRecs.filter(r=>r.semaforo==='AMARILLO').length,fichaRecs.filter(r=>r.semaforo==='ROJO').length,fichaRecs.filter(r=>r.semaforo==='NA').length]} colors={[C.emerald,C.amber,C.rose,C.s400]} height={160}/>:<div style={{height:160,display:'flex',alignItems:'center',justifyContent:'center',color:C.s400}}>Sin registros</div>}</Card>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            <Card><CardTitle>📈 Evolución del rendimiento</CardTitle>{fichaRecs.length?<LineChart labels={fichaRecs.slice(-14).map(r=>fmtDate(r.fecha))} datasets={[{label:'% Cumplimiento',data:fichaRecs.slice(-14).map(r=>r.tipoEmpleado==='Operario'?r.cumplimiento:null),borderColor:C.indigo,backgroundColor:'rgba(99,102,241,.08)',fill:true,tension:0.35,pointBackgroundColor:fichaRecs.slice(-14).map(r=>r.semaforo==='VERDE'?C.emerald:r.semaforo==='AMARILLO'?C.amber:r.semaforo==='ROJO'?C.rose:C.s400),pointRadius:5,spanGaps:true},{label:'Puntaje final',data:fichaRecs.slice(-14).map(r=>r.puntajeFinal),borderColor:C.violetD,backgroundColor:'transparent',tension:0.35,borderDash:[5,5],spanGaps:true}]} height={210} yMax={130}/>:<div style={{height:210,display:'flex',alignItems:'center',justifyContent:'center',color:C.s400}}>Sin registros</div>}</Card>
            <Card><CardTitle>📅 Asistencia / horas</CardTitle>{fichaRecs.length?<BarChart labels={fichaRecs.slice(-14).map(r=>fmtDate(r.fecha))} datasets={[{label:'Horas',data:fichaRecs.slice(-14).map(r=>r.horas),backgroundColor:fichaRecs.slice(-14).map(r=>r.estadoDia==='Presente'?C.emerald:r.estadoDia==='Tarde'?C.amber:r.estadoDia==='Ausente'?C.rose:C.s300),borderRadius:4}]} height={170}/>:<div style={{height:170,display:'flex',alignItems:'center',justifyContent:'center',color:C.s400}}>Sin registros</div>}</Card>
            <div><SLabel>Últimos registros</SLabel><DataTable headers={['Fecha','Estado','E','S','Entrada vs turno','Salida vs turno','Producción','Meta','% Cumpl.','Horas','Puntaje','Semáforo']} rows={fichaRecs.slice().reverse().slice(0,15).map(r=>[fmtDate(r.fecha),<StatusBadge key={r.id+'s'} value={r.estadoDia}/>,r.entrada||'—',r.salida||'—',entryStatus(r),exitStatus(r),r.produccionReal,r.metaDiaria,`${r.cumplimiento}%`,r.horas,r.puntajeFinal??'—',<Badge key={r.id+'b'} value={r.semaforo}/>])} searchQ={globalSearch}/></div>
          </div>
        </div>
        </>}
      </div>}

      {tab==='HISTORIAL'&&<div>
        <SecH title='Historial' subtitle='Buscador avanzado de presentes, producción, sal y movimientos de personal.' />
        <Card style={{marginBottom:'16px'}}>
          <div style={{display:'grid',gridTemplateColumns:gridCols('2fr 1fr 1fr 1fr 1fr 1fr','repeat(2,minmax(120px,1fr))'),gap:'10px'}}>
            <Field label='Buscar'><Inp value={histFilters.texto} onChange={e=>setHistFilters(p=>({...p,texto:e.target.value}))} placeholder='Nombre, legajo, detalle…'/></Field>
            <Field label='Tipo'><Sel value={histFilters.tipo} onChange={e=>setHistFilters(p=>({...p,tipo:e.target.value}))}><option value='Todos'>Todos</option><option value='Presentismo'>Presentismo</option><option value='Producción'>Producción</option><option value='Movimientos'>Movimientos</option><option value='Sal'>Sal</option></Sel></Field>
            <Field label='Desde'><DateInp value={histFilters.fechaDesde} onChange={e=>setHistFilters(p=>({...p,fechaDesde:e.target.value}))}/></Field>
            <Field label='Hasta'><DateInp value={histFilters.fechaHasta} onChange={e=>setHistFilters(p=>({...p,fechaHasta:e.target.value}))}/></Field>
            <Field label='Semana'><Sel value={histFilters.semana} onChange={e=>setHistFilters(p=>({...p,semana:e.target.value}))}><option value='Todas'>Todas</option>{allWeeks.map(w=><option key={w} value={w}>Semana {w}</option>)}</Sel></Field>
            <Field label='Sector'><Sel value={histFilters.sector} onChange={e=>setHistFilters(p=>({...p,sector:e.target.value}))}><option value='Todos'>Todos</option>{sectors.map(s=><option key={s} value={s}>{s}</option>)}</Sel></Field>
          </div>
        </Card>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'10px',marginBottom:'16px'}}>
          <KPI label='Filas' value={historyFiltered.length} bg={C.indigoL} color={C.indigoD}/>
          <KPI label='Presentismo' value={historyFiltered.filter(r=>r.tipo==='Presentismo').length} bg={C.emeraldL} color={C.emeraldD}/>
          <KPI label='Producción' value={historyFiltered.filter(r=>r.tipo==='Producción').length} bg={C.skyL} color={C.skyD}/>
          <KPI label='Movimientos' value={historyFiltered.filter(r=>r.tipo==='Movimientos').length} bg={C.amberL} color={C.amberD}/>
          <KPI label='Sal' value={historyFiltered.filter(r=>r.tipo==='Sal').length} bg={C.violetL} color={C.violetD}/>
        </div>
        <DataTable headers={['Fecha','Semana','Tipo','Legajo','Nombre','Sector','Estado / Cambio','Detalle']} rows={historyFiltered.map(r=>[fmtDate(r.fecha),r.semana||'—',r.tipo,r.legajo,r.nombre,r.sector||'—',r.estado,r.detalle])} searchQ={histFilters.texto}/>
      </div>}

      {tab==='ADMIN_PERSONAL'&&<div>
        <SecH title='Administración de personal' subtitle='La baja ahora es lógica: se mueve a "Personal dado de baja" y se puede reactivar.' right={<BtnP onClick={()=>setShowEmpImport(true)}>📥 Importar desde archivo</BtnP>} />
        <div style={{display:'grid',gridTemplateColumns:gridCols('370px 1fr'),gap:'16px',alignItems:'start'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <div style={{display:'grid',gridTemplateColumns:gridCols('1fr 1fr'),gap:'10px'}}>
              <KPI label='Activos' value={activeEmployees.length} bg={C.indigoL} color={C.indigoD}/>
              <KPI label='Baja' value={inactiveEmployees.length} bg={C.roseL} color={C.roseD}/>
              <KPI label='Operarios' value={activeEmployees.filter(e=>e.tipoEmpleado==='Operario').length} bg={C.emeraldL} color={C.emeraldD}/>
              <KPI label='Movimientos' value={movements.length} bg={C.amberL} color={C.amberD}/>
            </div>
            <Card>
              <CardTitle>{empForm.id?'✏️ Editando empleado':'➕ Nuevo empleado'}</CardTitle>
              <div style={{display:'grid',gridTemplateColumns:gridCols('1fr 1fr'),gap:'10px',marginBottom:'14px'}}>
                <Field label='Legajo'><Inp placeholder='Auto si vacío' value={empForm.legajo} onChange={e=>setEmpForm(p=>({...p,legajo:e.target.value}))}/></Field>
                <Field label='Nombre'><Inp value={empForm.nombre} onChange={e=>setEmpForm(p=>({...p,nombre:e.target.value}))}/></Field>
                <Field label='Sector'><Inp value={empForm.sector} onChange={e=>setEmpForm(p=>({...p,sector:e.target.value}))}/></Field>
                <Field label='Turno'><Sel value={empForm.turno} onChange={e=>setEmpForm(p=>({...p,turno:e.target.value}))}>{TURNOS.map(t=><option key={t} value={t}>{t}</option>)}</Sel></Field>
                <Field label='Tipo'><Sel value={empForm.tipoEmpleado} onChange={e=>setEmpForm(p=>({...p,tipoEmpleado:e.target.value}))}>{ETYPES.map(t=><option key={t} value={t}>{t}</option>)}</Sel></Field>
                <Field label='Supervisor'><Inp value={empForm.supervisor} onChange={e=>setEmpForm(p=>({...p,supervisor:e.target.value}))}/></Field>
                <Field label='Meta diaria'><Inp type='number' min='0' value={empForm.metaDiaria} onChange={e=>setEmpForm(p=>({...p,metaDiaria:e.target.value}))}/></Field>
                <Field label='Activo'><Sel value={empForm.activo?'Sí':'No'} onChange={e=>setEmpForm(p=>({...p,activo:e.target.value==='Sí'}))}><option value='Sí'>Sí</option><option value='No'>No</option></Sel></Field>
              </div>
              <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}><BtnP onClick={saveEmployee}>{empForm.id?'Guardar cambios':'Agregar empleado'}</BtnP><BtnN onClick={()=>setEmpForm(emptyEmp)}>Limpiar</BtnN></div>
            </Card>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
            <div><SLabel>Personal activo</SLabel><DataTable headers={['Legajo','Nombre','Sector','Turno','Tipo','Supervisor','Meta','Acción']} rows={activeEmployees.map(e=>[<span key={e.id+'lg'} style={{fontFamily:'monospace',fontWeight:700,color:C.indigoD}}>{e.legajo}</span>,e.nombre,e.sector,e.turno,e.tipoEmpleado,e.supervisor||'—',e.metaDiaria,<div key={e.id+'ab'} style={{display:'flex',gap:'6px'}}><BtnS onClick={()=>setEmpForm({id:e.id,legajo:e.legajo,nombre:e.nombre,sector:e.sector,turno:e.turno,tipoEmpleado:e.tipoEmpleado,supervisor:e.supervisor,metaDiaria:String(e.metaDiaria),activo:e.activo})}>Editar</BtnS><BtnD onClick={()=>sendToBaja(e.id)}>Dar de baja</BtnD></div>])} searchQ={globalSearch}/></div>
            <div><SLabel>Personal dado de baja</SLabel><DataTable headers={['Legajo','Nombre','Sector','Turno','Tipo','Supervisor','Meta','Acción']} rows={inactiveEmployees.map(e=>[<span key={e.id+'lg'} style={{fontFamily:'monospace',fontWeight:700,color:C.roseD}}>{e.legajo}</span>,e.nombre,e.sector,e.turno,e.tipoEmpleado,e.supervisor||'—',e.metaDiaria,<BtnP key={e.id+'r'} onClick={()=>reactivateEmployee(e.id)} style={{padding:'6px 12px'}}>Reactivar</BtnP>])} searchQ={globalSearch}/></div>
            <div><SLabel>Historial de movimientos</SLabel><DataTable headers={['Fecha','Legajo','Nombre','Cambio','Antes','Después','Autoriza','Activo','Observación']} rows={movements.map(m=>[fmtDate(m.fecha),m.legajo,m.nombre,m.cambio,m.valorAnterior,m.valorNuevo,m.autoriza,m.activo,m.observacion])} searchQ={globalSearch}/></div>
          </div>
        </div>
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
